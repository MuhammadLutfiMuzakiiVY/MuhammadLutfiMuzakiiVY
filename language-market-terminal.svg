    <text x="130" y="0">BUILD SPEED</text>
    <text x="260" y="0">POPULARITY</text>
    <text x="390" y="0">MEM EFFICIENCY</text>
    <text x="540" y="0">SAFETY SCORE</text>
    <text x="680" y="0">PERF INDEX</text>
    <text x="800" y="0">TREND</text>
    <line x1="0" y1="10" x2="850" y2="10" stroke="#1E293B" stroke-width="1" />
  </g>

