<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="100%" height="220">
  <defs>
    <!-- Ocean Deep Gradient -->
    <linearGradient id="oceanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#021B38" />
      <stop offset="35%" stop-color="#042C5C" />
      <stop offset="75%" stop-color="#031A3D" />
      <stop offset="100%" stop-color="#010B1B" />
    </linearGradient>

    <!-- Wave Fill 1 -->
    <linearGradient id="wave1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0055FF" stop-opacity="0.1" />
    </linearGradient>

    <!-- Wave Fill 2 -->
    <linearGradient id="wave2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#001F4D" stop-opacity="0.05" />
    </linearGradient>

    <!-- Submarine Glow Filter -->
    <filter id="glowYellow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <filter id="glowCyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <filter id="glowPink" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <!-- Ocean Background -->
  <rect width="900" height="220" rx="14" fill="url(#oceanGrad)" stroke="#00D4FF" stroke-width="1.2" />

  <!-- UNDERWATER BIOLUMINESCENT LIGHT RAYS -->
  <g opacity="0.15">
    <polygon points="120,0 200,0 350,220 220,220" fill="#00FFFF" />
    <polygon points="450,0 520,0 680,220 580,220" fill="#00FF88" />
    <polygon points="700,0 780,0 890,220 790,220" fill="#00D4FF" />
  </g>

  <!-- ANIMATED OCEAN WAVE TOP 1 -->
  <path d="M 0 40 Q 150 10 300 40 T 600 40 T 900 40 L 900 220 L 0 220 Z" fill="url(#wave1)">
    <animate attributeName="d" dur="4s" repeatCount="indefinite" values="
      M 0 40 Q 150 10 300 40 T 600 40 T 900 40 L 900 220 L 0 220 Z;
      M 0 20 Q 150 50 300 20 T 600 20 T 900 20 L 900 220 L 0 220 Z;
      M 0 40 Q 150 10 300 40 T 600 40 T 900 40 L 900 220 L 0 220 Z" />
  </path>

  <!-- ANIMATED OCEAN WAVE TOP 2 -->
  <path d="M 0 50 Q 200 70 400 40 T 800 60 L 900 50 L 900 220 L 0 220 Z" fill="url(#wave2)">
    <animate attributeName="d" dur="3s" repeatCount="indefinite" values="
      M 0 50 Q 200 70 400 40 T 800 60 L 900 50 L 900 220 L 0 220 Z;
      M 0 30 Q 200 20 400 60 T 800 30 L 900 40 L 900 220 L 0 220 Z;
      M 0 50 Q 200 70 400 40 T 800 60 L 900 50 L 900 220 L 0 220 Z" />
  </path>

  <!-- RISING AIR BUBBLES -->
  <g fill="#00FFFF" opacity="0.6">
    <!-- Bubble 1 -->
    <circle cx="140" cy="180" r="4">
      <animate attributeName="cy" values="210;20;-10" dur="4.2s" repeatCount="indefinite" />
      <animate attributeName="cx" values="140;148;135;140" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0.3;0" dur="4.2s" repeatCount="indefinite" />
    </circle>
    <!-- Bubble 2 -->
    <circle cx="320" cy="190" r="6">
      <animate attributeName="cy" values="220;10;-10" dur="5.1s" repeatCount="indefinite" />
      <animate attributeName="cx" values="320;312;325;320" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.9;0.2;0" dur="5.1s" repeatCount="indefinite" />
    </circle>
    <!-- Bubble 3 -->
    <circle cx="580" cy="200" r="3">
      <animate attributeName="cy" values="220;30;-10" dur="3.8s" repeatCount="indefinite" />
      <animate attributeName="cx" values="580;588;575;580" dur="1.8s" repeatCount="indefinite" />
    </circle>
    <!-- Bubble 4 -->
    <circle cx="760" cy="180" r="5">
      <animate attributeName="cy" values="210;15;-10" dur="4.8s" repeatCount="indefinite" />
      <animate attributeName="cx" values="760;752;765;760" dur="2.2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- SCHOOL OF FISH SWIMMING NAIK TURUN NON-STOP -->
  <!-- Fish Group 1 (Cyan Fish Swimming Left to Right) -->
  <g transform="translate(100, 110)">
    <animateTransform attributeName="transform" type="translate" values="-80,110; 960,110" dur="12s" repeatCount="indefinite" />
    
    <!-- Fish 1 -->
    <path d="M 0 0 C 15 -10 30 -5 40 0 C 30 5 15 10 0 0 Z M -8 0 L -18 -8 L -12 0 L -18 8 Z" fill="#00FF88" filter="url(#glowGreen)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-25; 0,15; 0,0" dur="3s" repeatCount="indefinite" />
    </path>
    <!-- Fish 2 -->
    <path d="M 25 18 C 38 10 50 14 58 18 C 50 22 38 26 25 18 Z M 18 18 L 10 12 L 14 18 L 10 24 Z" fill="#00FFFF" filter="url(#glowCyan)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,20; 0,-15; 0,0" dur="2.6s" repeatCount="indefinite" />
    </path>
    <!-- Fish 3 -->
    <path d="M 50 -15 C 62 -22 72 -18 80 -15 C 72 -12 62 -8 50 -15 Z M 44 -15 L 36 -20 L 40 -15 L 36 -10 Z" fill="#FF007F" filter="url(#glowPink)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-18; 0,18; 0,0" dur="3.4s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Fish Group 2 (Yellow & Lime Fish Swimming Right to Left) -->
  <g transform="translate(850, 150)">
    <animateTransform attributeName="transform" type="translate" values="980,150; -120,150" dur="14s" repeatCount="indefinite" />
    
    <!-- Fish 4 (Facing Left) -->
    <path d="M 0 0 C -15 -10 -30 -5 -40 0 C -30 5 -15 10 0 0 Z M 8 0 L 18 -8 L 12 0 L 18 8 Z" fill="#FFD700" filter="url(#glowYellow)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,25; 0,-20; 0,0" dur="3.2s" repeatCount="indefinite" />
    </path>
    <!-- Fish 5 -->
    <path d="M -30 -20 C -42 -28 -54 -24 -62 -20 C -54 -16 -42 -12 -30 -20 Z M -24 -20 L -16 -25 L -20 -20 L -16 -15 Z" fill="#00FF88" filter="url(#glowGreen)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-15; 0,22; 0,0" dur="2.8s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- FUTURISTIC CYBER SUBMARINE CRUISING OCEAN DEEP -->
  <g transform="translate(180, 85)">
    <!-- Submarine Floating Movement (Moving smoothly left to right + hovering up & down) -->
    <animateTransform attributeName="transform" type="translate" values="-180,90; 940,90" dur="18s" repeatCount="indefinite" />
    
    <!-- Hovering oscillating up/down -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-15; 0,10; 0,0" dur="4s" repeatCount="indefinite" />

      <!-- FRONT SONAR SEARCHLIGHT BEAM (GLOWING YELLOW/CYAN) -->
      <polygon points="120,-2 280,-40 280,36 120,6" fill="#00FFFF" opacity="0.25" filter="url(#glowCyan)" />

      <!-- SUBMARINE MAIN HULL (CYBER U-BOAT) -->
      <rect x="0" y="-14" width="125" height="34" rx="17" fill="#071836" stroke="#00FFFF" stroke-width="2" filter="url(#glowCyan)" />
      <path d="M 110 -14 Q 135 3 110 20 Z" fill="#00D4FF" filter="url(#glowCyan)" />

      <!-- PERISCOPE & TOWER -->
      <rect x="50" y="-28" width="22" height="15" rx="4" fill="#0A224D" stroke="#00FF88" stroke-width="1.5" />
      <path d="M 62 -28 L 62 -36 L 70 -36" fill="none" stroke="#00FF88" stroke-width="2.5" stroke-linecap="round" />
      <circle cx="70" cy="-36" r="3" fill="#FF007F" filter="url(#glowPink)">
        <animate attributeName="opacity" values="1;0.2;1" dur="0.8s" repeatCount="indefinite" />
      </circle>

      <!-- GLOWING PORTOLE WINDOWS (YELLOW/CYAN NEON) -->
      <circle cx="30" cy="3" r="6" fill="#FFD700" stroke="#00FFFF" stroke-width="1.2" filter="url(#glowYellow)" />
      <circle cx="52" cy="3" r="6" fill="#FFD700" stroke="#00FFFF" stroke-width="1.2" filter="url(#glowYellow)" />
      <circle cx="74" cy="3" r="6" fill="#FFD700" stroke="#00FFFF" stroke-width="1.2" filter="url(#glowYellow)" />

      <!-- PROPELLER (SPINNING AT BACK) -->
      <g transform="translate(-8, 3)">
        <line x1="0" y1="-12" x2="0" y2="12" stroke="#00FF88" stroke-width="3" filter="url(#glowGreen)">
          <animateTransform attributeName="transform" type="rotate" values="0;360" dur="0.2s" repeatCount="indefinite" />
        </line>
        <circle cx="0" cy="0" r="3" fill="#00FF88" />
      </g>

      <!-- SONAR RADAR WAVE PULSE EMITTING FROM SUB -->
      <circle cx="120" cy="3" r="15" fill="none" stroke="#00FF88" stroke-width="1.5" opacity="0.8">
        <animate attributeName="r" values="5;45;65" dur="1.8s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.9;0.4;0" dur="1.8s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>

  <!-- BOTTOM TEXT OVERLAY -->
  <text x="450" y="200" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#00FFFF" text-anchor="middle" letter-spacing="2">
    🌊 DEEP OCEAN QUANT TELEMETRY • HIGH-VOLTAGE SUBMARINE 🌊
  </text>
</svg>
