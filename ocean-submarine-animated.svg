<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="100%" height="220">
  <defs>
    <!-- Deep Matrix Code Ocean Gradient -->
    <linearGradient id="oceanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#01070D" />
      <stop offset="35%" stop-color="#031A0F" />
      <stop offset="75%" stop-color="#02120B" />
      <stop offset="100%" stop-color="#000403" />
    </linearGradient>

    <!-- Wave Fill 1 (Matrix Green) -->
    <linearGradient id="wave1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00FF41" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#003B10" stop-opacity="0.05" />
    </linearGradient>

    <!-- Wave Fill 2 (Toxic Red Glitch) -->
    <linearGradient id="wave2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF0000" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.0" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glowGreen" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glowRed" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <!-- CRT Grid Pattern -->
    <pattern id="matrixGrid" width="40" height="20" patternUnits="userSpaceOnUse">
      <text x="0" y="14" font-family="'Courier New', monospace" font-size="10" fill="#00FF41" opacity="0.15">10101</text>
    </pattern>
  </defs>

  <!-- Ocean Base -->
  <rect width="900" height="220" rx="14" fill="url(#oceanGrad)" stroke="#00FF41" stroke-width="1.8" filter="url(#glowGreen)" />
  <rect width="900" height="220" rx="14" fill="url(#matrixGrid)" />

  <!-- ANIMATED MATRIX BINARY OCEAN WAVE TOP 1 -->
  <path d="M 0 40 Q 150 10 300 40 T 600 40 T 900 40 L 900 220 L 0 220 Z" fill="url(#wave1)">
    <animate attributeName="d" dur="4s" repeatCount="indefinite" values="
      M 0 40 Q 150 10 300 40 T 600 40 T 900 40 L 900 220 L 0 220 Z;
      M 0 20 Q 150 50 300 20 T 600 20 T 900 20 L 900 220 L 0 220 Z;
      M 0 40 Q 150 10 300 40 T 600 40 T 900 40 L 900 220 L 0 220 Z" />
  </path>

  <!-- ANIMATED TOXIC RED WAVE TOP 2 -->
  <path d="M 0 55 Q 200 75 400 45 T 800 65 L 900 55 L 900 220 L 0 220 Z" fill="url(#wave2)">
    <animate attributeName="d" dur="3s" repeatCount="indefinite" values="
      M 0 55 Q 200 75 400 45 T 800 65 L 900 55 L 900 220 L 0 220 Z;
      M 0 35 Q 200 25 400 65 T 800 35 L 900 45 L 900 220 L 0 220 Z;
      M 0 55 Q 200 75 400 45 T 800 65 L 900 55 L 900 220 L 0 220 Z" />
  </path>

  <!-- RISING PROGRAMMING CODE SNIPPETS (FLOATING CODE IN OCEAN) -->
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#00FF41" opacity="0.8">
    <!-- Code Stream 1 -->
    <text x="70" y="190">
      def sys_exploit(): return 0xDEADBEEF
      <animate attributeName="y" values="220;30;-20" dur="5.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.9;0.4;0" dur="5.5s" repeatCount="indefinite" />
    </text>
    <!-- Code Stream 2 -->
    <text x="280" y="200" fill="#FF0000" filter="url(#glowRed)">
      int main() { char buffer[256]; inject(); }
      <animate attributeName="y" values="230;20;-20" dur="6.2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.3;0" dur="6.2s" repeatCount="indefinite" />
    </text>
    <!-- Code Stream 3 -->
    <text x="520" y="180" fill="#00F0FF">
      let mut stream = TcpStream::connect("127.0.0.1:4444");
      <animate attributeName="y" values="220;40;-20" dur="4.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.9;0.2;0" dur="4.8s" repeatCount="indefinite" />
    </text>
    <!-- Code Stream 4 -->
    <text x="730" y="210" fill="#FFB000">
      SELECT * FROM users WHERE 1=1 --
      <animate attributeName="y" values="230;30;-20" dur="5.8s" repeatCount="indefinite" />
    </text>
  </g>

  <!-- MATRIX CODE FISH SWIMMING NAIK TURUN NON-STOP -->
  <!-- Code Fish Group 1 (Matrix Green Code Fish Swimming Left to Right) -->
  <g transform="translate(100, 120)">
    <animateTransform attributeName="transform" type="translate" values="-120,120; 980,120" dur="11s" repeatCount="indefinite" />
    
    <!-- Code Fish 1 -->
    <text x="0" y="0" font-family="'Courier New', monospace" font-size="13" font-weight="900" fill="#00FF41" filter="url(#glowGreen)">
      &gt;_ [010101]&gt;&gt;
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-25; 0,15; 0,0" dur="3s" repeatCount="indefinite" />
    </text>
    <!-- Code Fish 2 -->
    <text x="120" y="25" font-family="'Courier New', monospace" font-size="12" font-weight="900" fill="#FF0000" filter="url(#glowRed)">
      &lt;EXPLOIT_PAYLOAD&gt;&gt;
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,20; 0,-18; 0,0" dur="2.6s" repeatCount="indefinite" />
    </text>
  </g>

  <!-- HACKER CYBER SUBMARINE / DESTRUCTION VESSEL SCANNING CODE OCEAN -->
  <g transform="translate(180, 85)">
    <!-- Submarine Floating Movement -->
    <animateTransform attributeName="transform" type="translate" values="-180,90; 950,90" dur="16s" repeatCount="indefinite" />
    
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-14; 0,10; 0,0" dur="3.8s" repeatCount="indefinite" />

      <!-- FRONT LASER SCANNING BEAM (TOXIC RED & MATRIX GREEN) -->
      <polygon points="120,-2 310,-45 310,40 120,6" fill="#00FF41" opacity="0.25" filter="url(#glowGreen)" />
      <polygon points="120,0 280,-20 280,20 120,4" fill="#FF0000" opacity="0.2" filter="url(#glowRed)" />

      <!-- SUBMARINE MAIN HULL (DARK BLACK-HAT CYBER VESSEL) -->
      <rect x="0" y="-14" width="128" height="34" rx="17" fill="#030A05" stroke="#00FF41" stroke-width="2" filter="url(#glowGreen)" />
      <path d="M 112 -14 Q 138 3 112 20 Z" fill="#FF0000" filter="url(#glowRed)" />

      <!-- PERISCOPE & RADAR TOWER -->
      <rect x="52" y="-28" width="22" height="15" rx="4" fill="#051408" stroke="#00FF41" stroke-width="1.5" />
      <path d="M 64 -28 L 64 -36 L 72 -36" fill="none" stroke="#FF0000" stroke-width="2.5" stroke-linecap="round" />
      <!-- Pulsing Eye -->
      <circle cx="72" cy="-36" r="3.5" fill="#FF0000" filter="url(#glowRed)">
        <animate attributeName="opacity" values="1;0.2;1" dur="0.6s" repeatCount="indefinite" />
      </circle>

      <!-- GLOWING PORTOLE WINDOWS WITH CODE GLYPHS -->
      <circle cx="30" cy="3" r="6" fill="#00FF41" stroke="#FF0000" stroke-width="1.2" filter="url(#glowGreen)" />
      <circle cx="54" cy="3" r="6" fill="#00FF41" stroke="#FF0000" stroke-width="1.2" filter="url(#glowGreen)" />
      <circle cx="78" cy="3" r="6" fill="#00FF41" stroke="#FF0000" stroke-width="1.2" filter="url(#glowGreen)" />

      <!-- PROPELLER (SPINNING AT BACK) -->
      <g transform="translate(-8, 3)">
        <line x1="0" y1="-12" x2="0" y2="12" stroke="#FF0000" stroke-width="3" filter="url(#glowRed)">
          <animateTransform attributeName="transform" type="rotate" values="0;360" dur="0.15s" repeatCount="indefinite" />
        </line>
        <circle cx="0" cy="0" r="3" fill="#00FF41" />
      </g>

      <!-- SONAR RADAR WAVE PULSE EMITTING FROM SUB -->
      <circle cx="120" cy="3" r="15" fill="none" stroke="#00FF41" stroke-width="1.5" opacity="0.8">
        <animate attributeName="r" values="5;45;65" dur="1.6s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.9;0.3;0" dur="1.6s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>

  <!-- BOTTOM TEXT OVERLAY -->
  <text x="450" y="202" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#00FF41" text-anchor="middle" letter-spacing="2">
    ☠️ DIGITAL MATRIX CODE OCEAN • HACKER SUBMARINE SCANNING TELEMETRY ☠️
  </text>
</svg>
