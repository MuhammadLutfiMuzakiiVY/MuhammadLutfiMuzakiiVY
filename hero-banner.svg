<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 290" width="100%" height="290">
  <defs>
    <!-- Dark Background Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="50%" stop-color="#08111F" />
      <stop offset="100%" stop-color="#020408" />
    </linearGradient>

    <linearGradient id="cyanBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C8FF" />
      <stop offset="50%" stop-color="#00F5FF" />
      <stop offset="100%" stop-color="#7B61FF" />
    </linearGradient>

    <!-- Neon Glow Filters -->
    <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <filter id="glowCyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <!-- Animated Cyber Grid Pattern -->
    <pattern id="cyberGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00F5FF" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.15" />
    </pattern>
  </defs>

  <!-- Frame Background -->
  <rect width="900" height="290" rx="14" fill="url(#bgGrad)" stroke="#00C8FF" stroke-width="1.8" filter="url(#glowBlue)" />
  <rect width="900" height="290" rx="14" fill="url(#cyberGrid)" />

  <!-- LIVE FLOATING BACKGROUND CODING MATRIX ANIMATION -->
  <g font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="10" font-weight="900" opacity="0.22">
    <!-- Stream 1 (Left to Right) -->
    <g fill="#00F5FF" transform="translate(30, 80)">
      <text y="0">pub async fn spawn_ai_agent() -&gt; Result&lt;Agent, EngineError&gt; {</text>
      <text y="70">let model = AutoModelForCausalLM::from_pretrained("DeepSeek-V3")?;</text>
      <text y="140">tokio::spawn(async move { listen_incoming_traffic().await });</text>

      <animateTransform attributeName="transform" type="translate" values="30, 80; 30, 60; 30, 80" dur="4s" repeatCount="indefinite" />
    </g>

    <!-- Stream 2 (Right Side) -->
    <g fill="#7B61FF" transform="translate(480, 90)">
      <text y="0">const [state, setState] = useState&lt;SystemMetrics&gt;(INITIAL);</text>
      <text y="60">SELECT * FROM telemetry WHERE status = 'OPTIMAL' LIMIT 1000;</text>
      <text y="120">kubectl apply -f ./k8s/production-deployment.yaml --namespace=core</text>

      <animateTransform attributeName="transform" type="translate" values="480, 90; 480, 110; 480, 90" dur="5s" repeatCount="indefinite" />
    </g>
  </g>

  <!-- ANIMATED FLOATING NETWORK PARTICLES -->
  <g fill="#00F5FF" opacity="0.6">
    <circle cx="120" cy="50" r="2" filter="url(#glowCyan)">
      <animate attributeName="cy" values="50;230;50" dur="8s" repeatCount="indefinite" />
    </circle>
    <circle cx="280" cy="220" r="3" fill="#7B61FF">
      <animate attributeName="cy" values="220;40;220" dur="10s" repeatCount="indefinite" />
    </circle>
    <circle cx="740" cy="80" r="2.5" filter="url(#glowCyan)">
      <animate attributeName="cy" values="80;250;80" dur="7s" repeatCount="indefinite" />
    </circle>
    <circle cx="820" cy="200" r="2" fill="#00C8FF">
      <animate attributeName="cy" values="200;60;200" dur="9s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- TOP STATUS HEADER BAR -->
  <rect x="20" y="16" width="860" height="38" rx="6" fill="#08111F" stroke="#00C8FF" stroke-width="1" />
  <circle cx="42" cy="35" r="5" fill="#FF0055" />
  <circle cx="59" cy="35" r="5" fill="#FFB000" />
  <circle cx="76" cy="35" r="5" fill="#00F5FF" />

  <text x="96" y="40" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="900" fill="#00F5FF" letter-spacing="1">
    SYSTEM_ONLINE <tspan fill="#FFFFFF">| LIVE CODING MATRIX ACTIVE</tspan>
  </text>

  <!-- Live Status LED (Right) -->
  <g font-family="'JetBrains Mono', monospace" font-size="10" font-weight="bold" transform="translate(680, 26)">
    <rect x="0" y="0" width="90" height="18" rx="3" fill="#00F5FF" opacity="0.15" stroke="#00F5FF" stroke-width="0.8" />
    <text x="45" y="13" fill="#00F5FF" text-anchor="middle">● OPERATIONAL
      <animate attributeName="opacity" values="1;0.2;1" dur="0.8s" repeatCount="indefinite" />
    </text>

    <rect x="98" y="0" width="80" height="18" rx="3" fill="#7B61FF" opacity="0.15" stroke="#7B61FF" stroke-width="0.8" />
    <text x="138" y="13" fill="#7B61FF" text-anchor="middle">⚡ 0.1ms SLO</text>
  </g>

  <!-- CENTER LARGE ANIMATED TITLE -->
  <text x="450" y="118" font-family="'Inter', 'JetBrains Mono', sans-serif" font-size="36" font-weight="900" fill="url(#cyanBlue)" text-anchor="middle" letter-spacing="3" filter="url(#glowCyan)">
    MUHAMMAD LUTFI MUZAKI
    <animate attributeName="opacity" values="1;0.85;1" dur="2s" repeatCount="indefinite" />
  </text>

  <!-- ANIMATED ROTATING SUBTITLE -->
  <g font-family="'JetBrains Mono', monospace" font-size="15" font-weight="800" text-anchor="middle">
    <!-- Role 1: Senior AI Engineer -->
    <text x="450" y="152" fill="#00F5FF">
      ⚡ SENIOR AI ENGINEER &amp; FULL-STACK ARCHITECT ⚡
      <animate attributeName="opacity" values="1;1;0;0;0;0;1" dur="12s" repeatCount="indefinite" />
    </text>
    <!-- Role 2: Cybersecurity Researcher -->
    <text x="450" y="152" fill="#7B61FF">
      🛡️ CYBERSECURITY RESEARCHER &amp; RED TEAM SENTINEL 🛡️
      <animate attributeName="opacity" values="0;0;1;1;0;0;0" dur="12s" repeatCount="indefinite" />
    </text>
    <!-- Role 3: Rust & High Performance -->
    <text x="450" y="152" fill="#00C8FF">
      🦀 HIGH-PERFORMANCE RUST &amp; GO SYSTEMS DEVELOPER 🦀
      <animate attributeName="opacity" values="0;0;0;0;1;1;0" dur="12s" repeatCount="indefinite" />
    </text>
  </g>

  <!-- BIO SUMMARY BOX -->
  <rect x="75" y="174" width="750" height="42" rx="6" fill="#08111F" stroke="#00F5FF" stroke-width="1" filter="url(#glowCyan)" />
  <text x="450" y="193" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
    Building intelligent systems. Designing scalable architectures. Creating secure software.
  </text>
  <text x="450" y="207" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="bold" fill="#00F5FF" text-anchor="middle">
    [✓] High-Throughput AI LLM Agents • [✓] Zero-Trust Cyber Hardening • [✓] Distributed Cloud Infrastructure
  </text>

  <!-- BOTTOM TYPING PROMPT WITH LIVE CODING SYMBOLS -->
  <text x="30" y="248" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#00F5FF">
    root@lutfi-workstation:~# <tspan fill="#FFFFFF">cargo run --bin autonomous_system --release</tspan>
  </text>
  <!-- Blinking Cursor -->
  <rect x="625" y="238" width="8" height="14" fill="#00F5FF" filter="url(#glowCyan)">
    <animate attributeName="opacity" values="1;0;1" dur="0.6s" repeatCount="indefinite" />
  </rect>
</svg>
