<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="100%" height="480">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070A" />
      <stop offset="50%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020407" />
    </linearGradient>

    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00E5FF" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.15" />
    </pattern>
  </defs>

  <rect width="900" height="480" rx="10" fill="url(#bgGrad)" stroke="#00E5FF" stroke-width="1.6" filter="url(#glowCyan)" />
  <rect width="900" height="480" rx="10" fill="url(#grid)" />

  <!-- TOP TITLE BAR -->
  <rect x="15" y="14" width="870" height="36" rx="6" fill="#030A14" stroke="#00E5FF" stroke-width="1" />
  <circle cx="35" cy="32" r="5" fill="#FF0055" />
  <circle cx="52" cy="32" r="5" fill="#FF9900" />
  <circle cx="69" cy="32" r="5" fill="#00FF66" />
  <text x="90" y="36" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="900" fill="#00E5FF" letter-spacing="1">
    ⚡ FRAMEWORK &amp; INFRASTRUCTURE MARKET TERMINAL <tspan fill="#00FF66">| METRICS &amp; STARS</tspan>
  </text>
  <circle cx="865" cy="32" r="4" fill="#00E5FF" filter="url(#glowCyan)">
