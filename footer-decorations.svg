<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="100%" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="50%" stop-color="#091322" />
      <stop offset="100%" stop-color="#03060C" />
    </linearGradient>

    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="900" height="160" rx="10" fill="url(#bgGrad)" stroke="#00F5FF" stroke-width="1.6" filter="url(#glowCyan)" />

  <!-- TOP DECORATIONS BAR WITH PROGRAMMER LOGOS -->
  <g transform="translate(25, 20)" font-family="'JetBrains Mono', monospace" font-size="14">
    <!-- Rust -->
    <text x="0" y="0" fill="#DEA584">🦀 Rust</text>
    <!-- Go -->
    <text x="90" y="0" fill="#00ADD8">🐹 Go</text>
    <!-- Python -->
    <text x="160" y="0" fill="#3776AB">🐍 Python</text>
    <!-- TypeScript -->
    <text x="250" y="0" fill="#3178C6">📘 TS</text>
    <!-- Docker -->
    <text x="320" y="0" fill="#2496ED">🐳 Docker</text>
    <!-- Kubernetes -->
    <text x="410" y="0" fill="#326CE5">☸️ K8s</text>
    <!-- Linux -->
    <text x="490" y="0" fill="#FCC624">🐧 Linux</text>
    <!-- Git -->
    <text x="580" y="0" fill="#F05032">🌿 Git</text>
    <!-- AI -->
    <text x="650" y="0" fill="#7B61FF">🤖 vLLM</text>
    <!-- GPU -->
    <text x="740" y="0" fill="#76B900">💻 RTX GPU</text>
  </g>

  <!-- LOGS BOX HEADER -->
  <rect x="20" y="38" width="860" height="106" rx="6" fill="#08111F" stroke="#00C8FF" stroke-width="1" />

  <!-- INFINITE SCROLLING SYSTEM TELEMETRY LOGS -->
  <g font-family="'JetBrains Mono', monospace" font-size="10" font-weight="bold" fill="#00F5FF">
    <g transform="translate(35, 58)">
      <text y="0" fill="#00F5FF">[0.0001s] AUTONOMOUS SYSTEM INITIALIZED: RUST COMPILER v1.85 [-O3 OPTIMIZED]</text>
      <text y="16" fill="#50FA7B">[0.0003s] vLLM DeepSeek-V3 Inference Engine: 650 tok/s Active (3.1ms SLO)</text>
      <text y="32" fill="#00F5FF">[0.0005s] Zero-Trust Cybersecurity Sentinel: 0 CVE Vulnerabilities • 4,892 Blocked</text>
      <text y="48" fill="#50FA7B">[0.0008s] High-Throughput Redis Cluster: 1,850,000 TPS In-Memory Active</text>
      <text y="64" fill="#00F5FF">[0.0012s] Kubernetes Cluster Health: 128/128 Pods Operational in EKS</text>
      <text y="80" fill="#50FA7B">[0.0015s] GitHub Actions Workflow: 412 Unit Tests Passed (98.4% Coverage)</text>

      <animateTransform attributeName="transform" type="translate" values="35, 58; 35, -42" dur="3.5s" repeatCount="indefinite" />
    </g>
  </g>
</svg>
