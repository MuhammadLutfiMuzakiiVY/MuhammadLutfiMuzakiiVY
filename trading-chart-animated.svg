  <g>
    <line x1="745" y1="55" x2="745" y2="135" stroke="#00FF88" stroke-width="1.5" />
    <rect x="739" y="65" width="12" height="55" fill="#00FF88" rx="2">
      <animate attributeName="height" values="55;68;45;55" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="y" values="65;52;75;65" dur="1.5s" repeatCount="indefinite" />
    </rect>
