<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="100%" height="420">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030612" />
      <stop offset="40%" stop-color="#070E26" />
      <stop offset="80%" stop-color="#0B1330" />
      <stop offset="100%" stop-color="#02040B" />
    </linearGradient>

    <!-- Wave Fill Gradient 1 (Neon Green) -->
    <linearGradient id="areaGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="0.45" />
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </linearGradient>

    <!-- Wave Fill Gradient 2 (Cyan/Purple) -->
    <linearGradient id="areaPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9D00FF" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glowGreen" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glowCyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glowPink" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Cyber Grid Pattern -->
    <pattern id="cyberGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#101F42" stroke-width="0.8" stroke-dasharray="2,2" />
    </pattern>
  </defs>

  <!-- Outer Border Frame with Neon Glow -->
  <rect width="900" height="420" rx="16" fill="url(#bgGrad)" stroke="#00FFFF" stroke-width="1.8" filter="url(#glowCyan)" opacity="0.8" />
  <rect width="900" height="420" rx="16" fill="url(#bgGrad)" stroke="#00FF88" stroke-width="1" />
  <rect width="900" height="420" rx="16" fill="url(#cyberGrid)" opacity="0.7" />

  <!-- TOP PRO TRADER NAVIGATION & MARKET HEADER -->
  <rect x="15" y="14" width="870" height="52" rx="10" fill="#081436" fill-opacity="0.9" stroke="#1E293B" stroke-width="1.2" />
  
  <!-- Logo & Exchange Title -->
  <g transform="translate(30, 44)">
    <text font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14" font-weight="900" fill="#00FF88">
      ⚡ QUANT HFT ARCHITECT
    </text>
  </g>

  <!-- LIVE DYNAMIC PRICE COUNTER 1: BTC/USDT -->
  <g transform="translate(250, 44)">
    <text font-family="'JetBrains Mono', monospace" font-size="13" font-weight="bold" fill="#00D4FF">
      BTC/USDT 
      <tspan fill="#00FF88" font-weight="900">
        <animate attributeName="opacity" values="1;0.4;1;0.9;1" dur="0.9s" repeatCount="indefinite" />
        $98,945.50
      </tspan>
      <tspan fill="#00FF88" font-size="11"> (+6.84% ▲)</tspan>
    </text>
  </g>

  <!-- LIVE DYNAMIC PRICE COUNTER 2: ETH/USDT -->
  <g transform="translate(510, 44)">
    <text font-family="'JetBrains Mono', monospace" font-size="13" font-weight="bold" fill="#00D4FF">
      ETH/USDT 
      <tspan fill="#00FF88" font-weight="900">$3,520.80</tspan>
      <tspan fill="#00FF88" font-size="11"> (+4.2%)</tspan>
    </text>
  </g>

  <!-- LIVE PROFIT BADGE -->
  <g transform="translate(730, 31)">
    <rect width="140" height="26" rx="6" fill="#00FF88" fill-opacity="0.2" stroke="#00FF88" stroke-width="1.2" filter="url(#glowGreen)" />
    <text x="70" y="17" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#00FF88" text-anchor="middle">
      PNL: +$28,450.00 🚀
    </text>
  </g>

  <!-- MAIN CHART CONTAINER & ORDER BOOK SPLIT (Left: Chart, Right: Order Book) -->
  <!-- Vertical Separator Line -->
  <line x1="680" y1="75" x2="680" y2="400" stroke="#1E2B4C" stroke-width="1.5" stroke-dasharray="4,4" />

  <!-- PRICE AXIS GUIDELINES & NUMBERS (LEFT CHART) -->
  <g stroke="#16254A" stroke-dasharray="3,3">
    <line x1="40" y1="110" x2="670" y2="110" />
    <line x1="40" y1="170" x2="670" y2="170" />
    <line x1="40" y1="230" x2="670" y2="230" />
    <line x1="40" y1="290" x2="670" y2="290" />
  </g>

  <g font-family="'JetBrains Mono', monospace" font-size="10" fill="#64748B">
    <text x="635" y="114">$102,000</text>
    <text x="635" y="174">$98,000</text>
    <text x="635" y="234">$94,000</text>
    <text x="635" y="294">$90,000</text>
  </g>

  <!-- NON-STOP SMOOTH bezier WAVE AREA ANIMATION -->
  <path d="M 40 260 
           Q 100 280 160 210 
           T 280 190 
           T 400 130 
           T 520 170 
           T 640 90 
           L 670 70 
           L 670 330 
           L 40 330 Z" 
        fill="url(#areaGreen)">
    <animate attributeName="d" 
             dur="4s" 
             repeatCount="indefinite"
             values="
              M 40 260 Q 100 280 160 210 T 280 190 T 400 130 T 520 170 T 640 90 L 670 70 L 670 330 L 40 330 Z;
              M 40 230 Q 100 190 160 250 T 280 150 T 400 180 T 520 110 T 640 130 L 670 60 L 670 330 L 40 330 Z;
              M 40 270 Q 100 290 160 200 T 280 210 T 400 110 T 520 190 T 640 80 L 670 95 L 670 330 L 40 330 Z;
              M 40 260 Q 100 280 160 210 T 280 190 T 400 130 T 520 170 T 640 90 L 670 70 L 670 330 L 40 330 Z" />
  </path>

  <!-- PRIMARY HIGH-GLOW TREND LINE (NEON GREEN) -->
  <path d="M 40 260 
           Q 100 280 160 210 
           T 280 190 
           T 400 130 
           T 520 170 
           T 640 90 
           L 670 70" 
        fill="none" 
        stroke="#00FF88" 
        stroke-width="4" 
        filter="url(#glowGreen)">
    <animate attributeName="d" 
             dur="4s" 
             repeatCount="indefinite"
             values="
              M 40 260 Q 100 280 160 210 T 280 190 T 400 130 T 520 170 T 640 90 L 670 70;
              M 40 230 Q 100 190 160 250 T 280 150 T 400 180 T 520 110 T 640 130 L 670 60;
              M 40 270 Q 100 290 160 200 T 280 210 T 400 110 T 520 190 T 640 80 L 670 95;
              M 40 260 Q 100 280 160 210 T 280 190 T 400 130 T 520 170 T 640 90 L 670 70" />
  </path>

  <!-- SECONDARY EMA WAVE LINE (ELECTRIC CYAN) -->
  <path d="M 40 275 
           Q 120 250 200 220 
           T 360 170 
           T 520 180 
           T 670 110" 
        fill="none" 
        stroke="#00FFFF" 
        stroke-width="2.5" 
        stroke-dasharray="6,4" 
        filter="url(#glowCyan)">
    <animate attributeName="d" 
             dur="4s" 
             repeatCount="indefinite"
             values="
              M 40 275 Q 120 250 200 220 T 360 170 T 520 180 T 670 110;
              M 40 250 Q 120 210 200 260 T 360 140 T 520 140 T 670 90;
              M 40 285 Q 120 270 200 200 T 360 190 T 520 160 T 670 130;
              M 40 275 Q 120 250 200 220 T 360 170 T 520 180 T 670 110" />
  </path>

  <!-- HIGH-FREQUENCY DYNAMIC CANDLESTICKS (PULSING CONTINUOUSLY) -->
  <!-- Candle Group -->
  <g>
    <!-- Candle 1 -->
    <line x1="75" y1="210" x2="75" y2="290" stroke="#00FF88" stroke-width="1.5" />
    <rect x="69" y="225" width="12" height="45" fill="#00FF88" rx="2"><animate attributeName="height" values="45;55;35;45" dur="1.8s" repeatCount="indefinite" /><animate attributeName="y" values="225;215;235;225" dur="1.8s" repeatCount="indefinite" /></rect>

    <!-- Candle 2 -->
    <line x1="135" y1="200" x2="135" y2="280" stroke="#FF0055" stroke-width="1.5" />
    <rect x="129" y="210" width="12" height="40" fill="#FF0055" rx="2"><animate attributeName="height" values="40;25;50;40" dur="2.2s" repeatCount="indefinite" /><animate attributeName="y" values="210;225;200;210" dur="2.2s" repeatCount="indefinite" /></rect>

    <!-- Candle 3 -->
    <line x1="195" y1="170" x2="195" y2="260" stroke="#00FF88" stroke-width="1.5" />
    <rect x="189" y="180" width="12" height="55" fill="#00FF88" rx="2"><animate attributeName="height" values="55;65;45;55" dur="1.5s" repeatCount="indefinite" /><animate attributeName="y" values="180;170;190;180" dur="1.5s" repeatCount="indefinite" /></rect>

    <!-- Candle 4 -->
    <line x1="255" y1="150" x2="255" y2="230" stroke="#00FF88" stroke-width="1.5" />
    <rect x="249" y="160" width="12" height="50" fill="#00FF88" rx="2"><animate attributeName="height" values="50;40;60;50" dur="2.1s" repeatCount="indefinite" /><animate attributeName="y" values="160;170;150;160" dur="2.1s" repeatCount="indefinite" /></rect>

    <!-- Candle 5 -->
    <line x1="315" y1="160" x2="315" y2="240" stroke="#FF0055" stroke-width="1.5" />
    <rect x="309" y="170" width="12" height="35" fill="#FF0055" rx="2"><animate attributeName="height" values="35;45;25;35" dur="1.9s" repeatCount="indefinite" /><animate attributeName="y" values="170;160;180;170" dur="1.9s" repeatCount="indefinite" /></rect>

    <!-- Candle 6 Giant -->
    <line x1="375" y1="110" x2="375" y2="210" stroke="#00FF88" stroke-width="2" />
    <rect x="369" y="120" width="12" height="68" fill="#00FF88" rx="2" filter="url(#glowGreen)"><animate attributeName="height" values="68;78;58;68" dur="1.4s" repeatCount="indefinite" /><animate attributeName="y" values="120;110;130;120" dur="1.4s" repeatCount="indefinite" /></rect>

    <!-- Candle 7 Giant -->
    <line x1="435" y1="90" x2="435" y2="190" stroke="#00FF88" stroke-width="2" />
    <rect x="429" y="100" width="12" height="65" fill="#00FF88" rx="2" filter="url(#glowGreen)"><animate attributeName="height" values="65;75;55;65" dur="2.4s" repeatCount="indefinite" /><animate attributeName="y" values="100;90;110;100" dur="2.4s" repeatCount="indefinite" /></rect>

    <!-- Candle 8 -->
    <line x1="495" y1="130" x2="495" y2="210" stroke="#FF0055" stroke-width="1.5" />
    <rect x="489" y="140" width="12" height="45" fill="#FF0055" rx="2"><animate attributeName="height" values="45;30;55;45" dur="1.7s" repeatCount="indefinite" /><animate attributeName="y" values="140;155;130;140" dur="1.7s" repeatCount="indefinite" /></rect>

    <!-- Candle 9 -->
    <line x1="555" y1="100" x2="555" y2="180" stroke="#00FF88" stroke-width="1.5" />
    <rect x="549" y="110" width="12" height="52" fill="#00FF88" rx="2"><animate attributeName="height" values="52;62;42;52" dur="2.0s" repeatCount="indefinite" /><animate attributeName="y" values="110;100;120;110" dur="2.0s" repeatCount="indefinite" /></rect>

    <!-- Candle 10 SUPER LIVE CANDLE -->
    <line x1="615" y1="60" x2="615" y2="150" stroke="#00FF88" stroke-width="2.5" />
    <rect x="609" y="70" width="12" height="60" fill="#00FF88" rx="2" filter="url(#glowGreen)">
      <animate attributeName="height" values="60;78;48;68;60" dur="1.1s" repeatCount="indefinite" />
      <animate attributeName="y" values="70;52;82;62;70" dur="1.1s" repeatCount="indefinite" />
    </rect>
    <circle cx="615" cy="65" r="7" fill="#00FF88" filter="url(#glowGreen)">
      <animate attributeName="r" values="4;9;4" dur="0.7s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;1;0.4" dur="0.7s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- NON-STOP SCANNING LASER CURSOR -->
  <line x1="615" y1="70" x2="615" y2="340" stroke="#00FFFF" stroke-width="1.8" stroke-dasharray="4,4" filter="url(#glowCyan)">
    <animate attributeName="x1" values="40;615;40" dur="7s" repeatCount="indefinite" />
    <animate attributeName="x2" values="40;615;40" dur="7s" repeatCount="indefinite" />
  </line>

  <!-- FLOATING LIVE ORDER BADGE -->
  <g transform="translate(490, 150)">
    <animateTransform attributeName="transform" type="translate" values="490,150; 490,120; 490,160; 490,150" dur="3.5s" repeatCount="indefinite" />
    <rect width="145" height="42" rx="8" fill="#061233" fill-opacity="0.95" stroke="#00FFFF" stroke-width="1.5" filter="url(#glowCyan)" />
    <text x="72" y="18" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="900" fill="#00FFFF" text-anchor="middle">⚡ INSTANT ORDER: BUY</text>
    <text x="72" y="33" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="900" fill="#00FF88" text-anchor="middle">$98,945.50 ▲</text>
  </g>

  <!-- BUY/LONG SIGNALS -->
  <g transform="translate(340, 85)">
    <rect width="105" height="24" rx="12" fill="#00FF88" fill-opacity="0.25" stroke="#00FF88" stroke-width="1.2" filter="url(#glowGreen)" />
    <text x="52.5" y="16" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="900" fill="#00FF88" text-anchor="middle">▲ LONG ENTRY</text>
  </g>

  <!-- RIGHT COLUMN: REAL-TIME LIVE ORDER BOOK (ASKS & BIDS) -->
  <g transform="translate(695, 75)">
    <!-- Order Book Header -->
    <rect width="185" height="28" rx="6" fill="#091538" stroke="#1E293B" stroke-width="1" />
    <text x="12" y="18" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#00FFFF">ORDER BOOK (LIVE)</text>
    <text x="173" y="18" font-family="'JetBrains Mono', monospace" font-size="10" fill="#64748B" text-anchor="end">QTY</text>

    <!-- ASKS (RED SELL ORDERS) -->
    <g transform="translate(0, 36)" font-family="'JetBrains Mono', monospace" font-size="10">
      <!-- Ask 4 -->
      <rect x="40" y="0" width="145" height="16" fill="#FF0055" fill-opacity="0.15" />
      <text x="0" y="12" fill="#FF0055" font-weight="bold">$99,120</text>
      <text x="173" y="12" fill="#94A3B8" text-anchor="end">2.48 BTC</text>

      <!-- Ask 3 -->
      <rect x="70" y="20" width="115" height="16" fill="#FF0055" fill-opacity="0.2" />
      <text x="0" y="32" fill="#FF0055" font-weight="bold">$99,050</text>
      <text x="173" y="32" fill="#94A3B8" text-anchor="end">1.85 BTC</text>

      <!-- Ask 2 -->
      <rect x="30" y="40" width="155" height="16" fill="#FF0055" fill-opacity="0.25" />
      <text x="0" y="52" fill="#FF0055" font-weight="bold">$98,990</text>
      <text x="173" y="52" fill="#94A3B8" text-anchor="end">4.12 BTC</text>

      <!-- Ask 1 -->
      <rect x="15" y="60" width="170" height="16" fill="#FF0055" fill-opacity="0.3" />
      <text x="0" y="72" fill="#FF0055" font-weight="bold">$98,960</text>
      <text x="173" y="72" fill="#94A3B8" text-anchor="end">6.54 BTC</text>
    </g>

    <!-- CURRENT MID PRICE SPREAD -->
    <g transform="translate(0, 122)">
      <rect width="185" height="24" rx="4" fill="#00FF88" fill-opacity="0.15" stroke="#00FF88" stroke-width="1" />
      <text x="10" y="16" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#00FF88">
        $98,945.50
      </text>
      <text x="175" y="16" font-family="'JetBrains Mono', monospace" font-size="10" fill="#00FF88" text-anchor="end">
        ▲ SPREAD 0.01%
      </text>
    </g>

    <!-- BIDS (GREEN BUY ORDERS) -->
    <g transform="translate(0, 154)" font-family="'JetBrains Mono', monospace" font-size="10">
      <!-- Bid 1 -->
      <rect x="10" y="0" width="175" height="16" fill="#00FF88" fill-opacity="0.3" />
      <text x="0" y="12" fill="#00FF88" font-weight="bold">$98,940</text>
      <text x="173" y="12" fill="#94A3B8" text-anchor="end">8.92 BTC</text>

      <!-- Bid 2 -->
      <rect x="40" y="20" width="145" height="16" fill="#00FF88" fill-opacity="0.25" />
      <text x="0" y="32" fill="#00FF88" font-weight="bold">$98,880</text>
      <text x="173" y="32" fill="#94A3B8" text-anchor="end">5.15 BTC</text>

      <!-- Bid 3 -->
      <rect x="80" y="40" width="105" height="16" fill="#00FF88" fill-opacity="0.2" />
      <text x="0" y="52" fill="#00FF88" font-weight="bold">$98,810</text>
      <text x="173" y="52" fill="#94A3B8" text-anchor="end">2.30 BTC</text>

      <!-- Bid 4 -->
      <rect x="110" y="60" width="75" height="16" fill="#00FF88" fill-opacity="0.15" />
      <text x="0" y="72" fill="#00FF88" font-weight="bold">$98,750</text>
      <text x="173" y="72" fill="#94A3B8" text-anchor="end">1.10 BTC</text>
    </g>

    <!-- TECHNICAL INDICATOR GAUGES BELOW ORDER BOOK -->
    <g transform="translate(0, 242)">
      <rect width="185" height="75" rx="8" fill="#07112E" stroke="#1E293B" stroke-width="1" />
      <text x="10" y="18" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="bold" fill="#00FFFF">INDICATORS (1M):</text>
      <text x="10" y="36" font-family="'JetBrains Mono', monospace" font-size="10" fill="#E2E8F0">RSI (14): <tspan fill="#00FF88">72.4 (BULLISH)</tspan></text>
      <text x="10" y="52" font-family="'JetBrains Mono', monospace" font-size="10" fill="#E2E8F0">MACD: <tspan fill="#00FF88">POSITIVE CROSS</tspan></text>
      <text x="10" y="68" font-family="'JetBrains Mono', monospace" font-size="10" fill="#E2E8F0">AI ACCURACY: <tspan fill="#FF007F">98.4%</tspan></text>
    </g>
  </g>

  <!-- NON-STOP VOLUME HISTOGRAM BARS AT BOTTOM OF MAIN CHART -->
  <g transform="translate(40, 335)" opacity="0.85">
    <rect x="30" y="-30" width="10" height="30" fill="#00FF88" rx="1"><animate attributeName="height" values="30;42;20;30" dur="1.3s" repeatCount="indefinite" /><animate attributeName="y" values="-30;-42;-20;-30" dur="1.3s" repeatCount="indefinite" /></rect>
    <rect x="90" y="-22" width="10" height="22" fill="#FF0055" rx="1"><animate attributeName="height" values="22;35;12;22" dur="1.9s" repeatCount="indefinite" /><animate attributeName="y" values="-22;-35;-12;-22" dur="1.9s" repeatCount="indefinite" /></rect>
    <rect x="150" y="-40" width="10" height="40" fill="#00FF88" rx="1"><animate attributeName="height" values="40;52;30;40" dur="1.6s" repeatCount="indefinite" /><animate attributeName="y" values="-40;-52;-30;-40" dur="1.6s" repeatCount="indefinite" /></rect>
    <rect x="210" y="-35" width="10" height="35" fill="#00FF88" rx="1"><animate attributeName="height" values="35;48;25;35" dur="1.4s" repeatCount="indefinite" /><animate attributeName="y" values="-35;-48;-25;-35" dur="1.4s" repeatCount="indefinite" /></rect>
    <rect x="270" y="-18" width="10" height="18" fill="#FF0055" rx="1" />
    <rect x="330" y="-55" width="10" height="55" fill="#00FF88" rx="1"><animate attributeName="height" values="55;68;42;55" dur="1.1s" repeatCount="indefinite" /><animate attributeName="y" values="-55;-68;-42;-55" dur="1.1s" repeatCount="indefinite" /></rect>
    <rect x="390" y="-48" width="10" height="48" fill="#00FF88" rx="1" />
    <rect x="450" y="-25" width="10" height="25" fill="#FF0055" rx="1" />
    <rect x="510" y="-42" width="10" height="42" fill="#00FF88" rx="1"><animate attributeName="height" values="42;54;32;42" dur="1.7s" repeatCount="indefinite" /><animate attributeName="y" values="-42;-54;-32;-42" dur="1.7s" repeatCount="indefinite" /></rect>
    <rect x="570" y="-58" width="10" height="58" fill="#00FF88" rx="1"><animate attributeName="height" values="58;70;48;58" dur="0.9s" repeatCount="indefinite" /><animate attributeName="y" values="-58;-70;-48;-58" dur="0.9s" repeatCount="indefinite" /></rect>
  </g>
</svg>
