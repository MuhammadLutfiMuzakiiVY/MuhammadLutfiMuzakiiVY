  <!-- NON-STOP DYNAMIC VOLUME HISTOGRAM BARS AT BOTTOM -->
  <g opacity="0.8">
    <rect x="81" y="285" width="8" height="25" fill="#00FF88" rx="1"><animate attributeName="height" values="25;35;15;25" dur="1.5s" repeatCount="indefinite" /><animate attributeName="y" values="285;275;295;285" dur="1.5s" repeatCount="indefinite" /></rect>
    <rect x="141" y="290" width="8" height="20" fill="#FF0055" rx="1"><animate attributeName="height" values="20;30;10;20" dur="2s" repeatCount="indefinite" /><animate attributeName="y" values="290;280;300;290" dur="2s" repeatCount="indefinite" /></rect>
