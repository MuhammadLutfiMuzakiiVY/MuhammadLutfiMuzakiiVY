<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" width="100%" height="350">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040714" />
      <stop offset="50%" stop-color="#070E24" />
      <stop offset="100%" stop-color="#02040D" />
    </linearGradient>

    <!-- Wave Fill Gradient -->
    <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glowGreen" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glowCyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.8" stroke-dasharray="2,2" />
    </pattern>
  </defs>

  <!-- Background Card -->
  <rect width="900" height="350" rx="16" fill="url(#bgGrad)" stroke="#00D4FF" stroke-width="1.5" stroke-opacity="0.5" />
  <rect width="900" height="350" rx="16" fill="url(#grid)" opacity="0.6" />

  <!-- TOP TRADER TERMINAL BAR -->
  <rect x="20" y="16" width="860" height="46" rx="10" fill="#09132E" fill-opacity="0.9" stroke="#1E293B" stroke-width="1" />
  
  <text x="35" y="44" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" font-weight="bold" fill="#00FF88">📈 BINANCE PRO HFT</text>
  
  <!-- LIVE DYNAMIC PRICE COUNTER ANIMATION BTC/USDT -->
  <g transform="translate(210, 44)">
    <text font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" font-weight="bold" fill="#00D4FF">
      BTC/USDT: 
      <tspan fill="#00FF88">
        <animate attributeName="opacity" values="1;0.3;1;0.8;1" dur="1.2s" repeatCount="indefinite" />
        $98,
      </tspan>
      <tspan fill="#00FF88">
        <animate attributeName="opacity" values="1;0.5;1" dur="0.8s" repeatCount="indefinite" />
        540.00
      </tspan>
      <tspan fill="#00FF88" font-size="11"> (+5.42% ▲)</tspan>
    </text>
  </g>

  <!-- LIVE DYNAMIC PRICE COUNTER ETH/USDT -->
  <g transform="translate(480, 44)">
    <text font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" font-weight="bold" fill="#00D4FF">
      ETH: 
      <tspan fill="#00FF88">$3,485.50</tspan>
      <tspan fill="#00FF88" font-size="11"> (+3.9%)</tspan>
    </text>
  </g>

  <!-- LIVE PNL & AI BOT SIGNAL -->
  <g transform="translate(710, 44)">
    <rect x="-10" y="-18" width="150" height="26" rx="6" fill="#00FF88" fill-opacity="0.15" stroke="#00FF88" stroke-width="1" />
    <text font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#00FF88">⚡ PNL: +$14,850 (REAL)</text>
  </g>

  <!-- PRICE AXIS LEVEL DASHED LINES & NUMBERS -->
  <g stroke="#1E293B" stroke-dasharray="4,4">
    <line x1="50" y1="90" x2="840" y2="90" />
    <line x1="50" y1="140" x2="840" y2="140" />
    <line x1="50" y1="190" x2="840" y2="190" />
    <line x1="50" y1="240" x2="840" y2="240" />
  </g>

  <g font-family="'JetBrains Mono', monospace" font-size="10" fill="#64748B">
    <text x="845" y="94">$102,500</text>
    <text x="845" y="144">$98,500</text>
    <text x="845" y="194">$94,500</text>
    <text x="845" y="244">$90,500</text>
  </g>

  <!-- NON-STOP WAVE FILL AREA ANIMATION -->
  <path d="M 50 220 
           Q 110 240 170 190 
           T 290 170 
           T 410 120 
           T 530 155 
           T 650 95 
           T 770 115 
           L 840 70 
           L 840 275 
           L 50 275 Z" 
        fill="url(#areaGrad)">
    <animate attributeName="d" 
             dur="3s" 
             repeatCount="indefinite"
             values="
              M 50 220 Q 110 240 170 190 T 290 170 T 410 120 T 530 155 T 650 95 T 770 115 L 840 70 L 840 275 L 50 275 Z;
              M 50 190 Q 110 150 170 220 T 290 130 T 410 165 T 530 100 T 650 140 T 770 75 L 840 55 L 840 275 L 50 275 Z;
              M 50 230 Q 110 250 170 170 T 290 180 T 410 110 T 530 170 T 650 85 T 770 130 L 840 85 L 840 275 L 50 275 Z;
              M 50 220 Q 110 240 170 190 T 290 170 T 410 120 T 530 155 T 650 95 T 770 115 L 840 70 L 840 275 L 50 275 Z" />
  </path>

  <!-- NON-STOP MOVING MAIN TREND WAVE (GREEN) -->
  <path d="M 50 220 
           Q 110 240 170 190 
           T 290 170 
           T 410 120 
           T 530 155 
           T 650 95 
           T 770 115 
           L 840 70" 
        fill="none" 
        stroke="#00FF88" 
        stroke-width="3.5" 
        filter="url(#glowGreen)">
    <animate attributeName="d" 
             dur="3s" 
             repeatCount="indefinite"
             values="
              M 50 220 Q 110 240 170 190 T 290 170 T 410 120 T 530 155 T 650 95 T 770 115 L 840 70;
              M 50 190 Q 110 150 170 220 T 290 130 T 410 165 T 530 100 T 650 140 T 770 75 L 840 55;
              M 50 230 Q 110 250 170 170 T 290 180 T 410 110 T 530 170 T 650 85 T 770 130 L 840 85;
              M 50 220 Q 110 240 170 190 T 290 170 T 410 120 T 530 155 T 650 95 T 770 115 L 840 70" />
  </path>

  <!-- NON-STOP SECONDARY MOVING AVERAGE WAVE (CYAN EMA) -->
  <path d="M 50 235 
           Q 130 210 210 195 
           T 370 155 
           T 530 165 
           T 690 115 
           L 840 85" 
        fill="none" 
        stroke="#00D4FF" 
        stroke-width="2.5" 
        stroke-dasharray="6,4"
        filter="url(#glowCyan)">
    <animate attributeName="d" 
             dur="3s" 
             repeatCount="indefinite"
             values="
              M 50 235 Q 130 210 210 195 T 370 155 T 530 165 T 690 115 L 840 85;
              M 50 210 Q 130 180 210 230 T 370 135 T 530 130 T 690 95 L 840 70;
              M 50 240 Q 130 220 210 180 T 370 165 T 530 150 T 690 120 L 840 95;
              M 50 235 Q 130 210 210 195 T 370 155 T 530 165 T 690 115 L 840 85" />
  </path>

