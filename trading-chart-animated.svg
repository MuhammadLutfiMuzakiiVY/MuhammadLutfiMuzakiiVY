    <rect x="741" y="245" width="8" height="65" fill="#00FF88" rx="1"><animate attributeName="height" values="65;75;55;65" dur="1.1s" repeatCount="indefinite" /><animate attributeName="y" values="245;235;255;245" dur="1.1s" repeatCount="indefinite" /></rect>
