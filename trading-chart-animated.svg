  <!-- Candle 13 LIVE ACTIVE PULSING CANDLE -->
  <g>
    <line x1="805" y1="40" x2="805" y2="115" stroke="#00FF88" stroke-width="2.5" />
    <rect x="799" y="50" width="12" height="48" fill="#00FF88" rx="2" filter="url(#glowGreen)">
      <animate attributeName="height" values="48;62;38;56;48" dur="1.2s" repeatCount="indefinite" />
      <animate attributeName="y" values="50;36;60;42;50" dur="1.2s" repeatCount="indefinite" />
    </rect>
