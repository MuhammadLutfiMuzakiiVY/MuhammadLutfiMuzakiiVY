      <text x="67" y="16" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="bold" fill="#00FFFF" text-anchor="middle">LIVE ORDER: BUY</text>
      <text x="67" y="30" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#00FF88" text-anchor="middle">$98,950.00 ▲</text>
