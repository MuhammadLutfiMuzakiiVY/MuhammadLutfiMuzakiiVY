<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="100%" height="320">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050818" />
      <stop offset="50%" stop-color="#081028" />
      <stop offset="100%" stop-color="#030510" />
    </linearGradient>

    <!-- Wave Fill Gradient -->
    <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="0.35" />
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </linearGradient>

    <!-- Glowing Cyan Line Filter -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Glowing Green Filter -->
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.75" stroke-dasharray="2,2" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="16" fill="url(#bgGrad)" stroke="#00D4FF" stroke-width="1.5" stroke-opacity="0.4" />
  <rect width="900" height="320" rx="16" fill="url(#grid)" opacity="0.6" />

  <!-- Header Info Bar -->
  <rect x="20" y="18" width="860" height="42" rx="8" fill="#0B1536" fill-opacity="0.8" stroke="#1E293B" stroke-width="1" />
  
  <text x="35" y="44" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14" font-weight="bold" fill="#00FF88">📈 QUANT HFT ALGO TERMINAL</text>
  <text x="260" y="44" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#00D4FF">BTC/USDT: $98,540.00 <tspan fill="#00FF88">(+5.24% ▲)</tspan></text>
  <text x="510" y="44" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#00D4FF">ETH/USDT: $3,450.20 <tspan fill="#00FF88">(+3.80% ▲)</tspan></text>
  <text x="730" y="44" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#FF007F">AI SIGNAL: STRONG BUY</text>

  <!-- Horizontal Price Level Lines -->
  <line x1="50" y1="90" x2="850" y2="90" stroke="#1E293B" stroke-dasharray="4,4" />
  <text x="855" y="94" font-family="monospace" font-size="10" fill="#64748B">$102,000</text>

  <line x1="50" y1="140" x2="850" y2="140" stroke="#1E293B" stroke-dasharray="4,4" />
  <text x="855" y="144" font-family="monospace" font-size="10" fill="#64748B">$98,000</text>

  <line x1="50" y1="190" x2="850" y2="190" stroke="#1E293B" stroke-dasharray="4,4" />
  <text x="855" y="194" font-family="monospace" font-size="10" fill="#64748B">$94,000</text>

  <line x1="50" y1="240" x2="850" y2="240" stroke="#1E293B" stroke-dasharray="4,4" />
  <text x="855" y="244" font-family="monospace" font-size="10" fill="#64748B">$90,000</text>

  <!-- Animated Fill Area -->
  <path d="M 60 210 
           Q 120 230 180 180 
           T 300 160 
           T 420 120 
           T 540 150 
           T 660 90 
           T 780 110 
           L 840 75 
           L 840 270 
           L 60 270 Z" 
        fill="url(#areaGrad)">
    <animate attributeName="d" 
             dur="6s" 
             repeatCount="indefinite"
             values="
              M 60 210 Q 120 230 180 180 T 300 160 T 420 120 T 540 150 T 660 90 T 780 110 L 840 75 L 840 270 L 60 270 Z;
              M 60 200 Q 120 170 180 210 T 300 130 T 420 160 T 540 110 T 660 130 T 780 85 L 840 65 L 840 270 L 60 270 Z;
              M 60 210 Q 120 230 180 180 T 300 160 T 420 120 T 540 150 T 660 90 T 780 110 L 840 75 L 840 270 L 60 270 Z" />
  </path>

  <!-- Animated Glowing Trend Wave Line -->
  <path d="M 60 210 
           Q 120 230 180 180 
           T 300 160 
           T 420 120 
           T 540 150 
           T 660 90 
           T 780 110 
           L 840 75" 
        fill="none" 
        stroke="#00FF88" 
        stroke-width="3.5" 
        filter="url(#glowGreen)">
    <animate attributeName="d" 
             dur="6s" 
             repeatCount="indefinite"
             values="
              M 60 210 Q 120 230 180 180 T 300 160 T 420 120 T 540 150 T 660 90 T 780 110 L 840 75;
              M 60 200 Q 120 170 180 210 T 300 130 T 420 160 T 540 110 T 660 130 T 780 85 L 840 65;
              M 60 210 Q 120 230 180 180 T 300 160 T 420 120 T 540 150 T 660 90 T 780 110 L 840 75" />
  </path>

  <!-- Secondary EMA Moving Average Line (Cyan) -->
  <path d="M 60 230 
           Q 140 210 220 190 
           T 380 150 
           T 540 160 
           T 700 110 
           L 840 90" 
        fill="none" 
        stroke="#00D4FF" 
        stroke-width="2" 
        stroke-dasharray="6,4"
        filter="url(#glowCyan)">
    <animate attributeName="d" 
             dur="6s" 
             repeatCount="indefinite"
             values="
              M 60 230 Q 140 210 220 190 T 380 150 T 540 160 T 700 110 L 840 90;
              M 60 220 Q 140 190 220 220 T 380 140 T 540 130 T 700 100 L 840 80;
              M 60 230 Q 140 210 220 190 T 380 150 T 540 160 T 700 110 L 840 90" />
  </path>

  <!-- Candlesticks Array -->
  <!-- Candle 1 Green -->
  <line x1="90" y1="190" x2="90" y2="245" stroke="#00FF88" stroke-width="1.5" />
  <rect x="84" y="200" width="12" height="30" fill="#00FF88" rx="2" />

  <!-- Candle 2 Red -->
  <line x1="150" y1="180" x2="150" y2="235" stroke="#FF0055" stroke-width="1.5" />
  <rect x="144" y="190" width="12" height="28" fill="#FF0055" rx="2" />

  <!-- Candle 3 Green -->
  <line x1="210" y1="160" x2="210" y2="215" stroke="#00FF88" stroke-width="1.5" />
  <rect x="204" y="170" width="12" height="32" fill="#00FF88" rx="2" />

  <!-- Candle 4 Green -->
  <line x1="270" y1="140" x2="270" y2="195" stroke="#00FF88" stroke-width="1.5" />
  <rect x="264" y="148" width="12" height="35" fill="#00FF88" rx="2" />

  <!-- Candle 5 Red -->
  <line x1="330" y1="150" x2="330" y2="200" stroke="#FF0055" stroke-width="1.5" />
  <rect x="324" y="160" width="12" height="25" fill="#FF0055" rx="2" />

  <!-- Candle 6 Green Big -->
  <line x1="390" y1="110" x2="390" y2="175" stroke="#00FF88" stroke-width="1.5" />
  <rect x="384" y="118" width="12" height="45" fill="#00FF88" rx="2" />

  <!-- Candle 7 Green Big -->
  <line x1="450" y1="95" x2="450" y2="160" stroke="#00FF88" stroke-width="1.5" />
  <rect x="444" y="105" width="12" height="42" fill="#00FF88" rx="2" />

  <!-- Candle 8 Red -->
  <line x1="510" y1="120" x2="510" y2="180" stroke="#FF0055" stroke-width="1.5" />
  <rect x="504" y="130" width="12" height="35" fill="#FF0055" rx="2" />

  <!-- Candle 9 Green -->
  <line x1="570" y1="100" x2="570" y2="160" stroke="#00FF88" stroke-width="1.5" />
  <rect x="564" y="110" width="12" height="38" fill="#00FF88" rx="2" />

  <!-- Candle 10 Green -->
  <line x1="630" y1="80" x2="630" y2="140" stroke="#00FF88" stroke-width="1.5" />
  <rect x="624" y="88" width="12" height="40" fill="#00FF88" rx="2" />

  <!-- Candle 11 Red -->
  <line x1="690" y1="90" x2="690" y2="150" stroke="#FF0055" stroke-width="1.5" />
  <rect x="684" y="100" width="12" height="30" fill="#FF0055" rx="2" />

  <!-- Candle 12 Green Monster -->
  <line x1="750" y1="65" x2="750" y2="130" stroke="#00FF88" stroke-width="1.5" />
  <rect x="744" y="72" width="12" height="48" fill="#00FF88" rx="2" />

  <!-- Candle 13 Live Current Candle Pulsing -->
  <g>
    <line x1="810" y1="50" x2="810" y2="110" stroke="#00FF88" stroke-width="2" />
    <rect x="804" y="60" width="12" height="38" fill="#00FF88" rx="2" filter="url(#glowGreen)">
      <animate attributeName="height" values="38;48;32;44;38" dur="2s" repeatCount="indefinite" />
      <animate attributeName="y" values="60;50;66;54;60" dur="2s" repeatCount="indefinite" />
    </rect>
    <!-- Pulsing Live Dot -->
    <circle cx="810" cy="55" r="5" fill="#00FF88" filter="url(#glowGreen)">
      <animate attributeName="r" values="3;7;3" dur="1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Entry Signal Badges -->
  <g transform="translate(360, 75)">
    <rect width="90" height="22" rx="11" fill="#00FF88" fill-opacity="0.2" stroke="#00FF88" stroke-width="1" />
    <text x="45" y="15" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="bold" fill="#00FF88" text-anchor="middle">▲ LONG ENTRY</text>
  </g>

  <g transform="translate(715, 40)">
    <rect width="105" height="22" rx="11" fill="#00D4FF" fill-opacity="0.2" stroke="#00D4FF" stroke-width="1" />
    <text x="52" y="15" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="bold" fill="#00D4FF" text-anchor="middle">⚡ BREAKOUT HIGHER</text>
  </g>

  <!-- Volume Histogram Bars at Bottom -->
  <g opacity="0.7">
    <rect x="86" y="275" width="8" height="25" fill="#00FF88" rx="1" />
    <rect x="146" y="280" width="8" height="20" fill="#FF0055" rx="1" />
    <rect x="206" y="270" width="8" height="30" fill="#00FF88" rx="1" />
    <rect x="266" y="265" width="8" height="35" fill="#00FF88" rx="1" />
    <rect x="326" y="285" width="8" height="15" fill="#FF0055" rx="1" />
    <rect x="386" y="250" width="8" height="50" fill="#00FF88" rx="1" />
    <rect x="446" y="255" width="8" height="45" fill="#00FF88" rx="1" />
    <rect x="506" y="275" width="8" height="25" fill="#FF0055" rx="1" />
    <rect x="566" y="260" width="8" height="40" fill="#00FF88" rx="1" />
    <rect x="626" y="250" width="8" height="50" fill="#00FF88" rx="1" />
    <rect x="686" y="270" width="8" height="30" fill="#FF0055" rx="1" />
    <rect x="746" y="240" width="8" height="60" fill="#00FF88" rx="1" />
    <rect x="806" y="235" width="8" height="65" fill="#00FF88" rx="1">
      <animate attributeName="height" values="65;75;55;65" dur="2s" repeatCount="indefinite" />
      <animate attributeName="y" values="235;225;245;235" dur="2s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
