<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 130" width="100%" height="130">
  <defs>
    <linearGradient id="binanceBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0E11" />
      <stop offset="50%" stop-color="#181A20" />
      <stop offset="100%" stop-color="#0B0E11" />
    </linearGradient>

    <filter id="glowYellow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="900" height="130" rx="8" fill="url(#binanceBg)" stroke="#F0B90B" stroke-width="1.4" filter="url(#glowYellow)" />

  <g transform="translate(15, 12)">
