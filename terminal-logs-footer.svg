      ⚡ PROGRAMMER REALTIME LOGS TELEMETRY STREAM (COMPILER &amp; CI/CD BUFFER)
    </text>
  </g>

  <rect x="15" y="32" width="870" height="84" rx="4" fill="#181A20" stroke="#2B313A" stroke-width="1" />

