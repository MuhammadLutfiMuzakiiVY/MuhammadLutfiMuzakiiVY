<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 170" width="100%" height="170">
  <defs>
    <!-- Dark Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070A" />
      <stop offset="50%" stop-color="#0B101D" />
      <stop offset="100%" stop-color="#030508" />
    </linearGradient>

    <!-- Neon Glow Filters -->
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <filter id="glowOrange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <!-- Terminal Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00E5FF" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.15" />
    </pattern>
  </defs>

  <!-- Frame Base -->
  <rect width="900" height="170" rx="10" fill="url(#bgGrad)" stroke="#00FF66" stroke-width="1.6" filter="url(#glowGreen)" />
  <rect width="900" height="170" rx="10" fill="url(#grid)" />

  <!-- TOP HEADER TEXT BAR -->
  <rect x="15" y="14" width="870" height="38" rx="6" fill="#030A14" stroke="#00E5FF" stroke-width="1" />
  <circle cx="35" cy="33" r="5" fill="#FF0055" />
  <circle cx="52" cy="33" r="5" fill="#FF9900" />
  <circle cx="69" cy="33" r="5" fill="#00FF66" />
  
  <text x="90" y="38" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="900" fill="#00FF66" letter-spacing="1">
    SOFTWARE ENGINEERING QUANT TERMINAL <tspan fill="#00E5FF">| HIGH PERFORMANCE ENGINE</tspan>
  </text>

  <!-- TELEMETRY STATUS BADGES -->
  <g font-family="'JetBrains Mono', monospace" font-size="10" font-weight="bold">
    <rect x="590" y="24" width="95" height="18" rx="3" fill="#00FF66" opacity="0.15" stroke="#00FF66" stroke-width="0.8" />
    <text x="600" y="37" fill="#00FF66">● LIVE TELEMETRY</text>

    <rect x="695" y="24" width="85" height="18" rx="3" fill="#00E5FF" opacity="0.15" stroke="#00E5FF" stroke-width="0.8" />
    <text x="703" y="37" fill="#00E5FF">⚡ SYS ONLINE</text>

    <rect x="790" y="24" width="82" height="18" rx="3" fill="#FF9900" opacity="0.15" stroke="#FF9900" stroke-width="0.8" />
    <text x="796" y="37" fill="#FF9900">🤖 AI ACTIVE</text>
  </g>

  <!-- MIDDLE HARDWARE TELEMETRY GAUGES -->
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" transform="translate(25, 66)">
    <!-- CPU Gauge -->
    <g transform="translate(0, 0)">
      <text x="0" y="12" fill="#8899A6">CPU (16-Core Zen4)</text>
      <text x="145" y="12" fill="#00FF66" text-anchor="end">18.4%</text>
      <rect x="0" y="18" width="145" height="7" rx="3.5" fill="#0D192B" />
      <rect x="0" y="18" width="27" height="7" rx="3.5" fill="#00FF66" filter="url(#glowGreen)">
        <animate attributeName="width" values="27;45;20;27" dur="2.2s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- RAM Gauge -->
    <g transform="translate(170, 0)">
      <text x="0" y="12" fill="#8899A6">RAM (64GB DDR5)</text>
      <text x="145" y="12" fill="#00E5FF" text-anchor="end">24.1GB</text>
      <rect x="0" y="18" width="145" height="7" rx="3.5" fill="#0D192B" />
      <rect x="0" y="18" width="55" height="7" rx="3.5" fill="#00E5FF" filter="url(#glowCyan)">
        <animate attributeName="width" values="55;62;48;55" dur="3s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- GPU Inference Gauge -->
    <g transform="translate(340, 0)">
      <text x="0" y="12" fill="#8899A6">GPU (RTX 4090 AI)</text>
      <text x="145" y="12" fill="#FF9900" text-anchor="end">94.8%</text>
      <rect x="0" y="18" width="145" height="7" rx="3.5" fill="#0D192B" />
      <rect x="0" y="18" width="137" height="7" rx="3.5" fill="#FF9900" filter="url(#glowOrange)">
        <animate attributeName="width" values="137;142;130;137" dur="1.8s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Network Bandwidth Gauge -->
    <g transform="translate(510, 0)">
      <text x="0" y="12" fill="#8899A6">NET (10Gbps Fiber)</text>
      <text x="145" y="12" fill="#00FF66" text-anchor="end">1.4GB/s</text>
      <rect x="0" y="18" width="145" height="7" rx="3.5" fill="#0D192B" />
      <rect x="0" y="18" width="85" height="7" rx="3.5" fill="#00FF66" filter="url(#glowGreen)">
        <animate attributeName="width" values="85;95;78;85" dur="2.5s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>

  <!-- ROTATING RADAR SWEEP CIRCLE (RIGHT) -->
  <g transform="translate(730, 85)">
    <circle cx="0" cy="0" r="32" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.4" />
    <circle cx="0" cy="0" r="22" fill="none" stroke="#00FF66" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5" />
    <circle cx="0" cy="0" r="10" fill="none" stroke="#FF9900" stroke-width="0.8" opacity="0.6" />
    <line x1="-32" y1="0" x2="32" y2="0" stroke="#00E5FF" stroke-width="0.6" opacity="0.3" />
    <line x1="0" y1="-32" x2="0" y2="32" stroke="#00E5FF" stroke-width="0.6" opacity="0.3" />
    
    <!-- Rotating Sweep Line -->
    <line x1="0" y1="0" x2="32" y2="0" stroke="#00FF66" stroke-width="2" filter="url(#glowGreen)">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="2s" repeatCount="indefinite" />
    </line>
    <!-- Radar Target Blips -->
    <circle cx="12" cy="-14" r="2" fill="#FF0055" filter="url(#glowGreen)">
      <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite" />
    </circle>
    <circle cx="-18" cy="10" r="2" fill="#00E5FF" />
  </g>

  <!-- BOTTOM TERMINAL TYPING BAR -->
  <rect x="25" y="125" width="850" height="30" rx="5" fill="#020814" stroke="#00E5FF" stroke-width="1" />
  <text x="38" y="145" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#00FF66">
    root@quant-engine:~# <tspan fill="#F8FAFC">exec stream_telemetry_matrix.bin --user=MuhammadLutfiMuzakiiVY --interval=0.8ms</tspan>
  </text>
  <!-- Blinking Cursor -->
  <rect x="760" y="134" width="8" height="14" fill="#00FF66" filter="url(#glowGreen)">
    <animate attributeName="opacity" values="1;0;1" dur="0.6s" repeatCount="indefinite" />
  </rect>
</svg>
