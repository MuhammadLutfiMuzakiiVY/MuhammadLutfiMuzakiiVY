<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="100%" height="260">
  <defs>
    <!-- Binance Deep Charcoal Gradient Background -->
    <linearGradient id="binanceBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0E11" />
      <stop offset="50%" stop-color="#181A20" />
      <stop offset="100%" stop-color="#0B0E11" />
    </linearGradient>

    <!-- Binance Glow Filters -->
    <filter id="glowYellow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#2B313A" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.4" />
    </pattern>
  </defs>

  <!-- Base Binance Frame -->
  <rect width="900" height="260" rx="10" fill="url(#binanceBg)" stroke="#F0B90B" stroke-width="1.6" filter="url(#glowYellow)" />
  <rect width="900" height="260" rx="10" fill="url(#grid)" />

  <!-- BINANCE TOP NAVIGATION BAR -->
  <rect x="14" y="14" width="872" height="42" rx="6" fill="#181A20" stroke="#2B313A" stroke-width="1" />
  
  <!-- Binance Logo Icon -->
  <g transform="translate(26, 25)">
    <polygon points="10,0 20,10 10,20 0,10" fill="#F0B90B" filter="url(#glowYellow)" />
    <polygon points="10,5 15,10 10,15 5,10" fill="#0B0E11" />
  </g>

  <text x="56" y="40" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="900" fill="#F0B90B" letter-spacing="1">
    BINANCE FUTURES PRO <tspan fill="#EAECEF">| QUANT SOFTWARE ENGINEERING TERMINAL</tspan>
  </text>

  <!-- Binance Leverage & Status Badges (Right) -->
  <g font-family="'JetBrains Mono', monospace" font-size="10" font-weight="bold" transform="translate(615, 25)">
    <rect x="0" y="0" width="85" height="20" rx="3" fill="#F0B90B" opacity="0.2" stroke="#F0B90B" stroke-width="1" />
    <text x="42" y="14" fill="#F0B90B" text-anchor="middle">125x CROSS</text>

    <rect x="92" y="0" width="85" height="20" rx="3" fill="#0ECB81" opacity="0.2" stroke="#0ECB81" stroke-width="1" />
    <text x="134" y="14" fill="#0ECB81" text-anchor="middle">● LIVE MATCH
      <animate attributeName="opacity" values="1;0.3;1" dur="0.4s" repeatCount="indefinite" />
    </text>

    <rect x="184" y="0" width="72" height="20" rx="3" fill="#F6465D" opacity="0.2" stroke="#F6465D" stroke-width="1" />
    <text x="220" y="14" fill="#F6465D" text-anchor="middle">HFT ACTIVE</text>
  </g>

  <!-- BINANCE TICKER TELEMETRY BAR -->
  <g font-family="'JetBrains Mono', monospace" transform="translate(25, 74)">
    <rect x="0" y="0" width="850" height="42" rx="4" fill="#1E2329" stroke="#2B313A" stroke-width="1" />

    <!-- Pair Ticker -->
    <text x="15" y="26" font-size="15" font-weight="900" fill="#0ECB81" filter="url(#glowGreen)">
      RUST/USDT <tspan font-size="12" fill="#0ECB81">+18.42% 🚀</tspan>
      <animate attributeName="opacity" values="1;0.7;1" dur="0.5s" repeatCount="indefinite" />
    </text>

    <!-- 24h High -->
    <text x="220" y="18" font-size="9" font-weight="bold" fill="#848E9C">24h High (Perf Index)</text>
    <text x="220" y="32" font-size="11" font-weight="bold" fill="#EAECEF">99.8 TFLOPS</text>

    <!-- 24h Low -->
    <text x="380" y="18" font-size="9" font-weight="bold" fill="#848E9C">24h Low (Latency)</text>
    <text x="380" y="32" font-size="11" font-weight="bold" fill="#0ECB81">0.08 ms [ULTRA]</text>

    <!-- 24h Volume -->
    <text x="540" y="18" font-size="9" font-weight="bold" fill="#848E9C">24h Volume (Commits)</text>
    <text x="540" y="32" font-size="11" font-weight="bold" fill="#F0B90B">3,482,100 USDT</text>

    <!-- Mark Price -->
    <text x="700" y="18" font-size="9" font-weight="bold" fill="#848E9C">Mark Price</text>
    <text x="700" y="32" font-size="12" font-weight="900" fill="#F0B90B">$98,962.40</text>
  </g>

  <!-- MAIN NAME TITLE (BINANCE GOLD) -->
  <text x="450" y="152" font-family="'JetBrains Mono', monospace" font-size="34" font-weight="900" fill="#F0B90B" text-anchor="middle" letter-spacing="3" filter="url(#glowYellow)">
    🚀 MUHAMMAD LUTFI MUZAKI 🚀
  </text>

  <!-- SUBTITLE -->
  <text x="450" y="185" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="900" fill="#EAECEF" text-anchor="middle" letter-spacing="2">
    ⚡ BINANCE FUTURES PRO QUANT ENGINEER • SENIOR FULL-STACK AI &amp; HFT ARCHITECT ⚡
  </text>

  <!-- BINANCE LIVE ORDER ROUTER STATUS BOX -->
  <rect x="65" y="202" width="770" height="38" rx="6" fill="#181A20" stroke="#F0B90B" stroke-width="1.2" filter="url(#glowYellow)" />
  <text x="450" y="225" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#F0B90B" text-anchor="middle">
    [BINANCE FUTURES MATCHING ENGINE v5.0] ⚡ ORDER MATCHED IN 0.1ms • ROE PnL: +850.40% 🚀
  </text>
</svg>
