<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <style>
    @keyframes scan {
      0% { transform: translateY(15px); }
      50% { transform: translateY(280px); }
      100% { transform: translateY(15px); }
    }
    @keyframes glitch {
      0% { transform: translate(0) }
      20% { transform: translate(-2px, 1px) }
      40% { transform: translate(-1px, -1px) }
      60% { transform: translate(1px, 2px) }
      80% { transform: translate(1px, -1px) }
      100% { transform: translate(0) }
    }
    @keyframes blink {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.45; }
    }
    .bg { fill: #0a0d16; }
    .grid { stroke: #1f2937; stroke-width: 1; opacity: 0.35; }
    .neon-line { stroke: #00f0ff; stroke-width: 2; opacity: 0.9; filter: drop-shadow(0 0 8px #00f0ff); }
    .neon-purple { stroke: #bd00ff; stroke-width: 1.5; filter: drop-shadow(0 0 6px #bd00ff); }
    .text-main { font-family: 'Courier New', Courier, monospace; font-weight: 900; fill: #ffffff; font-size: 44px; letter-spacing: 6px; filter: drop-shadow(0 0 10px #00f0ff); }
    .text-sub { font-family: 'Courier New', Courier, monospace; fill: #bd00ff; font-size: 16px; letter-spacing: 3px; font-weight: 600; filter: drop-shadow(0 0 5px #bd00ff); }
    .matrix-text { font-family: monospace; fill: #00f0ff; font-size: 11px; opacity: 0.2; animation: blink 3s infinite ease-in-out; }
    .scan-line { stroke: #00f0ff; stroke-width: 2; opacity: 0.5; filter: drop-shadow(0 0 6px #00f0ff); animation: scan 4s infinite linear; }
  </style>
  <rect class="bg" width="800" height="300" />
  
  <!-- Grid Lines -->
  <g>
    <!-- Horizontal -->
    <line x1="0" y1="30" x2="800" y2="30" class="grid" />
    <line x1="0" y1="60" x2="800" y2="60" class="grid" />
    <line x1="0" y1="90" x2="800" y2="90" class="grid" />
    <line x1="0" y1="120" x2="800" y2="120" class="grid" />
    <line x1="0" y1="150" x2="800" y2="150" class="grid" />
    <line x1="0" y1="180" x2="800" y2="180" class="grid" />
    <line x1="0" y1="210" x2="800" y2="210" class="grid" />
    <line x1="0" y1="240" x2="800" y2="240" class="grid" />
    <line x1="0" y1="270" x2="800" y2="270" class="grid" />
    <!-- Vertical -->
    <line x1="50" y1="0" x2="50" y2="300" class="grid" />
    <line x1="100" y1="0" x2="100" y2="300" class="grid" />
    <line x1="150" y1="0" x2="150" y2="300" class="grid" />
    <line x1="200" y1="0" x2="200" y2="300" class="grid" />
    <line x1="250" y1="0" x2="250" y2="300" class="grid" />
    <line x1="300" y1="0" x2="300" y2="300" class="grid" />
    <line x1="350" y1="0" x2="350" y2="300" class="grid" />
    <line x1="400" y1="0" x2="400" y2="300" class="grid" />
    <line x1="450" y1="0" x2="450" y2="300" class="grid" />
    <line x1="500" y1="0" x2="500" y2="300" class="grid" />
    <line x1="550" y1="0" x2="550" y2="300" class="grid" />
    <line x1="600" y1="0" x2="600" y2="300" class="grid" />
    <line x1="650" y1="0" x2="650" y2="300" class="grid" />
    <line x1="700" y1="0" x2="700" y2="300" class="grid" />
    <line x1="750" y1="0" x2="750" y2="300" class="grid" />
  </g>
  
  <!-- Cyber HUD details -->
  <circle cx="400" cy="150" r="105" stroke="#bd00ff" stroke-width="1" fill="none" opacity="0.25" stroke-dasharray="10 5" />
  <circle cx="400" cy="150" r="115" stroke="#00f0ff" stroke-width="1.5" fill="none" opacity="0.35" stroke-dasharray="25 15 5 15" />
  <circle cx="400" cy="150" r="125" stroke="#00f0ff" stroke-width="0.5" fill="none" opacity="0.15" />

  <!-- Code / Binary rain backgrounds -->
  <g>
    <text x="30" y="55" class="matrix-text">01001100 01010101 01010100 01000110 01001001</text>
    <text x="30" y="85" class="matrix-text">SYSTEM_STATUS: ACTIVE_</text>
    <text x="30" y="115" class="matrix-text">> PORT_SCANNER... [OK]</text>
    <text x="30" y="145" class="matrix-text">> BYPASS_FIREWALL [GRANTED]</text>
    <text x="30" y="175" class="matrix-text">> DECRYPT_PAYLOAD... 100%</text>
    <text x="30" y="205" class="matrix-text">> LOG_READY: /dev/null</text>
    
    <text x="535" y="55" class="matrix-text">C++ | PYTHON | GO | RUST</text>
    <text x="535" y="85" class="matrix-text">IP: 127.0.0.1 [LOCALHOST]</text>
    <text x="535" y="115" class="matrix-text">> RED_TEAM_OPS: RUNNING</text>
    <text x="535" y="145" class="matrix-text">> VULN_SCANNING: COMPLETED</text>
    <text x="535" y="175" class="matrix-text">01100100 01100101 01110110</text>
    <text x="535" y="205" class="matrix-text">> ANTIGRAVITY_SYS: LINKED</text>
  </g>

  <!-- Glowing neon frames -->
  <rect x="15" y="15" width="770" height="270" fill="none" class="neon-line" />
  <rect x="20" y="20" width="760" height="260" fill="none" class="neon-purple" opacity="0.6" />
  
  <!-- Scan line -->
  <line x1="17" y1="0" x2="783" y2="0" class="scan-line" />
  
  <!-- Central Text -->
  <g style="animation: glitch 3.5s infinite;">
    <text x="400" y="145" dominant-baseline="middle" text-anchor="middle" class="text-main">LUTFI-DEV</text>
  </g>
  <text x="400" y="185" dominant-baseline="middle" text-anchor="middle" class="text-sub">CYBERSECURITY &amp; FULL-STACK</text>

  <!-- Corner tech accents -->
  <path d="M 15 45 L 15 15 L 45 15" fill="none" stroke="#00f0ff" stroke-width="4" />
  <path d="M 785 45 L 785 15 L 755 15" fill="none" stroke="#00f0ff" stroke-width="4" />
  <path d="M 15 255 L 15 285 L 45 285" fill="none" stroke="#00f0ff" stroke-width="4" />
  <path d="M 785 255 L 785 285 L 755 285" fill="none" stroke="#00f0ff" stroke-width="4" />
</svg>
