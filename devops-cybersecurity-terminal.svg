<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="100%" height="520">
  <defs>
    <linearGradient id="binanceBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0E11" />
      <stop offset="50%" stop-color="#181A20" />
      <stop offset="100%" stop-color="#0B0E11" />
    </linearGradient>

    <filter id="glowYellow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#2B313A" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.4" />
    </pattern>
  </defs>

  <rect width="900" height="520" rx="10" fill="url(#binanceBg)" stroke="#F0B90B" stroke-width="1.6" filter="url(#glowYellow)" />
  <rect width="900" height="520" rx="10" fill="url(#grid)" />

  <!-- TOP TITLE BAR -->
  <rect x="14" y="14" width="872" height="36" rx="6" fill="#181A20" stroke="#2B313A" stroke-width="1" />
  <text x="30" y="36" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="900" fill="#F0B90B" letter-spacing="1">
    ⚙️ BINANCE FUTURES ORDER EXECUTION &amp; DEVOPS POSITION RISK PANEL
  </text>
  <circle cx="865" cy="32" r="4" fill="#0ECB81" filter="url(#glowGreen)">
    <animate attributeName="opacity" values="1;0.2;1" dur="0.4s" repeatCount="indefinite" />
  </circle>

  <!-- LEFT: BINANCE FUTURES TRADE ORDER FORM (WIDTH 350) -->
  <g transform="translate(25, 65)" font-family="'JetBrains Mono', monospace">
    <rect x="0" y="0" width="340" height="420" rx="6" fill="#181A20" stroke="#2B313A" stroke-width="1" />
    
    <!-- Order Type Tabs -->
    <g transform="translate(15, 15)">
      <rect x="0" y="0" width="90" height="24" rx="4" fill="#F0B90B" />
      <text x="45" y="16" font-size="10" font-weight="900" fill="#0B0E11" text-anchor="middle">LIMIT</text>

      <rect x="100" y="0" width="90" height="24" rx="4" fill="#2B313A" />
      <text x="145" y="16" font-size="10" font-weight="bold" fill="#848E9C" text-anchor="middle">MARKET</text>

      <rect x="200" y="0" width="100" height="24" rx="4" fill="#2B313A" />
      <text x="250" y="16" font-size="10" font-weight="bold" fill="#848E9C" text-anchor="middle">STOP-LIMIT</text>
    </g>

    <!-- Price Input Box -->
    <g transform="translate(15, 55)" font-size="11" font-weight="bold">
      <text x="0" y="0" fill="#848E9C">Price (Build Speed)</text>
      <rect x="0" y="8" width="310" height="32" rx="4" fill="#1E2329" stroke="#2B313A" stroke-width="1" />
      <text x="12" y="29" fill="#EAECEF">0.42s (Rust Cargo)</text>
      <text x="295" y="29" fill="#848E9C" text-anchor="end">USDT</text>
    </g>

    <!-- Size Input Box -->
    <g transform="translate(15, 115)" font-size="11" font-weight="bold">
      <text x="0" y="0" fill="#848E9C">Size (K8s Pods / CPU)</text>
      <rect x="0" y="8" width="310" height="32" rx="4" fill="#1E2329" stroke="#2B313A" stroke-width="1" />
      <text x="12" y="29" fill="#EAECEF">128 Pods / 16-Core</text>
      <text x="295" y="29" fill="#848E9C" text-anchor="end">PODS</text>
    </g>

    <!-- Slider Leverage bar -->
    <g transform="translate(15, 175)">
      <text x="0" y="0" font-size="10" font-weight="bold" fill="#848E9C">Leverage Selector: 125x</text>
      <rect x="0" y="8" width="310" height="6" rx="3" fill="#2B313A" />
      <rect x="0" y="8" width="280" height="6" rx="3" fill="#F0B90B" />
      <circle cx="280" cy="11" r="7" fill="#F0B90B" filter="url(#glowYellow)" />
    </g>

    <!-- BUY LONG / SELL SHORT BUTTONS -->
    <g transform="translate(15, 215)">
      <rect x="0" y="0" width="148" height="42" rx="4" fill="#0ECB81" />
      <text x="74" y="26" font-size="13" font-weight="900" fill="#0B0E11" text-anchor="middle">BUY / LONG 🚀</text>

      <rect x="162" y="0" width="148" height="42" rx="4" fill="#F6465D" />
      <text x="236" y="26" font-size="13" font-weight="900" fill="#FFFFFF" text-anchor="middle">SELL / SHORT</text>
    </g>

    <!-- Account Margin Info -->
    <g transform="translate(15, 280)" font-size="10" font-weight="bold" fill="#848E9C">
      <text y="0">Avail Margin: <tspan fill="#EAECEF">64GB DDR5 / 4TB NVMe</tspan></text>
      <text y="20">Margin Ratio: <tspan fill="#0ECB81">2.14% (SAFE)</tspan></text>
      <text y="40">Max Position: <tspan fill="#F0B90B">100,000,000 USDT</tspan></text>
    </g>
  </g>

  <!-- RIGHT: DEVOPS & CYBERSECURITY SENTINEL POSITION RISK MATRIX (WIDTH 500) -->
  <g transform="translate(385, 65)" font-family="'JetBrains Mono', monospace">
    <rect x="0" y="0" width="490" height="420" rx="6" fill="#181A20" stroke="#2B313A" stroke-width="1" />
    <text x="15" y="22" font-size="11" font-weight="900" fill="#F0B90B">🛡️ DEVOPS &amp; CYBERSECURITY POSITION RISK MATRIX</text>
    <line x1="15" y1="30" x2="475" y2="30" stroke="#2B313A" stroke-width="1" />

    <g font-size="11" font-weight="bold" transform="translate(15, 50)">
      <text x="0" y="0" fill="#2496ED">Docker Containers:</text>
      <text x="180" y="0" fill="#0ECB81">42 RUNNING</text>
      <text x="330" y="0" fill="#EAECEF">CPU 12.4%</text>

      <text x="0" y="32" fill="#326CE5">Kubernetes Cluster:</text>
      <text x="180" y="32" fill="#0ECB81">128 PODS HEALTHY</text>
      <text x="330" y="32" fill="#EAECEF">RAM 32GB</text>

      <text x="0" y="64" fill="#FF9900">AWS (us-east-1):</text>
      <text x="180" y="64" fill="#0ECB81">99.99% UP</text>
      <text x="330" y="64" fill="#0ECB81">READY</text>

      <text x="0" y="96" fill="#F38020">Cloudflare Edge:</text>
      <text x="180" y="96" fill="#0ECB81">Global Workers</text>
      <text x="330" y="96" fill="#0ECB81">0.4ms Latency</text>

      <text x="0" y="128" fill="#F6465D">OWASP &amp; Burp Shield:</text>
      <text x="180" y="128" fill="#0ECB81">SQLi/XSS Shield</text>
      <text x="330" y="128" fill="#0ECB81">0 CVE VULN</text>

      <text x="0" y="160" fill="#9D00FF">Suricata IDS/IPS:</text>
      <text x="180" y="160" fill="#0ECB81">DDoS Filter Active</text>
      <text x="330" y="160" fill="#0ECB81">HARDENED</text>
    </g>

    <!-- BINANCE REALTIME PACKET STREAM BAR (BOTTOM) -->
    <g transform="translate(15, 240)">
      <text x="0" y="0" font-size="10" font-weight="900" fill="#848E9C">PACKET FLOW STREAMING (HIGH-SPEED MATCHING ENGINE)</text>
      <rect x="0" y="10" width="460" height="32" rx="4" fill="#1E2329" stroke="#2B313A" stroke-width="1" />
      
      <g transform="translate(15, 18)">
        <circle cx="10" cy="8" r="5" fill="#0ECB81" filter="url(#glowGreen)">
          <animate attributeName="cx" values="10;430;10" dur="1.2s" repeatCount="indefinite" />
        </circle>
        <circle cx="120" cy="8" r="5" fill="#F0B90B" filter="url(#glowYellow)">
          <animate attributeName="cx" values="120;430;10" dur="1.0s" repeatCount="indefinite" />
        </circle>
        <circle cx="250" cy="8" r="5" fill="#F6465D">
          <animate attributeName="cx" values="250;430;10" dur="1.4s" repeatCount="indefinite" />
        </circle>
      </g>
    </g>

    <!-- CI/CD BUILD SUCCESS STATUS -->
    <g transform="translate(15, 305)" font-size="10" font-weight="bold">
      <rect x="0" y="0" width="460" height="40" rx="4" fill="#1E2329" stroke="#0ECB81" stroke-width="1" />
      <text x="15" y="24" fill="#0ECB81">
        [✓] Cargo Build Passed (0.42s) • [✓] Unit Tests 100% (412 Passed) • [✓] 98.4% Coverage
      </text>
    </g>
  </g>
</svg>
