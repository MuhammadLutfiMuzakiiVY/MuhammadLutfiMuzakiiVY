<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="100%" height="520">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070A" />
      <stop offset="50%" stop-color="#0C1525" />
      <stop offset="100%" stop-color="#020407" />
    </linearGradient>

    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00E5FF" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.15" />
    </pattern>
  </defs>

  <rect width="900" height="520" rx="10" fill="url(#bgGrad)" stroke="#00FF66" stroke-width="1.6" filter="url(#glowGreen)" />
  <rect width="900" height="520" rx="10" fill="url(#grid)" />

  <!-- TOP TITLE BAR -->
  <rect x="15" y="14" width="870" height="36" rx="6" fill="#030A14" stroke="#00FF66" stroke-width="1" />
  <circle cx="35" cy="32" r="5" fill="#FF0055" />
  <circle cx="52" cy="32" r="5" fill="#FF9900" />
  <circle cx="69" cy="32" r="5" fill="#00FF66" />
  <text x="90" y="36" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="900" fill="#00FF66" letter-spacing="1">
    ⚙️ DEVOPS, CLOUD INFRASTRUCTURE &amp; CYBERSECURITY SENTINEL MATRIX
  </text>
  <circle cx="865" cy="32" r="4" fill="#FF0055" filter="url(#glowRed)">
    <animate attributeName="opacity" values="1;0.2;1" dur="0.25s" repeatCount="indefinite" />
  </circle>

  <!-- LEFT COLUMN: DEVOPS & CLOUD TELEMETRY -->
  <g transform="translate(25, 70)" font-family="'JetBrains Mono', monospace">
    <text x="0" y="0" font-size="11" font-weight="900" fill="#00E5FF">☁️ CLOUD INFRASTRUCTURE &amp; CONTAINERS</text>
    <line x1="0" y1="10" x2="410" y2="10" stroke="#1E293B" stroke-width="1" />

    <g transform="translate(0, 30)" font-size="11" font-weight="bold">
      <text x="0" y="0" fill="#2496ED">Docker Containers</text>
      <text x="170" y="0" fill="#00FF66">42 RUNNING</text>
      <text x="300" y="0" fill="#00E5FF">CPU 12.4%</text>
      <text x="410" y="0" fill="#F8FAFC" text-anchor="end">RAM 8.4GB</text>
    </g>

    <g transform="translate(0, 55)" font-size="11" font-weight="bold">
      <text x="0" y="0" fill="#326CE5">Kubernetes Cluster</text>
      <text x="170" y="0" fill="#00FF66">128 PODS [HEALTHY]</text>
      <text x="300" y="0" fill="#00E5FF">CPU 24.1%</text>
      <text x="410" y="0" fill="#F8FAFC" text-anchor="end">RAM 32GB</text>
    </g>

    <g transform="translate(0, 80)" font-size="11" font-weight="bold">
      <text x="0" y="0" fill="#FF9900">AWS (us-east-1)</text>
      <text x="170" y="0" fill="#00FF66">EKS / EC2 Active</text>
      <text x="300" y="0" fill="#00E5FF">99.99% UP</text>
      <text x="410" y="0" fill="#00FF66" text-anchor="end">READY</text>
    </g>

    <g transform="translate(0, 105)" font-size="11" font-weight="bold">
      <text x="0" y="0" fill="#F38020">Cloudflare Edge</text>
      <text x="170" y="0" fill="#00FF66">Global Workers</text>
      <text x="300" y="0" fill="#00E5FF">0.4ms Latency</text>
      <text x="410" y="0" fill="#00FF66" text-anchor="end">ACTIVE</text>
    </g>

    <g transform="translate(0, 130)" font-size="11" font-weight="bold">
      <text x="0" y="0" fill="#E6522C">Prometheus / Grafana</text>
      <text x="170" y="0" fill="#00FF66">1,400 Metrics/s</text>
      <text x="300" y="0" fill="#00E5FF">100% Ingest</text>
      <text x="410" y="0" fill="#00FF66" text-anchor="end">OK</text>
    </g>
  </g>

  <!-- RIGHT COLUMN: CYBERSECURITY THREAT MONITOR -->
  <g transform="translate(465, 70)" font-family="'JetBrains Mono', monospace">
    <text x="0" y="0" font-size="11" font-weight="900" fill="#FF0055">🛡️ CYBERSECURITY THREAT &amp; CVE SCANNER</text>
    <line x1="0" y1="10" x2="410" y2="10" stroke="#1E293B" stroke-width="1" />

    <g transform="translate(0, 30)" font-size="11" font-weight="bold">
      <text x="0" y="0" fill="#F8FAFC">THREAT LEVEL:</text>
      <rect x="110" y="-12" width="90" height="16" rx="3" fill="#00FF66" opacity="0.2" />
      <text x="155" y="0" fill="#00FF66" text-anchor="middle">LOW (SECURE)</text>

      <text x="230" y="0" fill="#F8FAFC">ATTACKS BLOCKED:</text>
      <text x="410" y="0" fill="#FF0055" text-anchor="end" font-weight="900">4,892 / DAY</text>
    </g>

    <g transform="translate(0, 55)" font-size="11" font-weight="bold">
      <text x="0" y="0" fill="#FF9900">OWASP ZAP / Burp</text>
      <text x="170" y="0" fill="#00FF66">SQLi &amp; XSS Shield</text>
      <text x="410" y="0" fill="#00FF66" text-anchor="end">0 CVE VULN</text>
    </g>

    <g transform="translate(0, 80)" font-size="11" font-weight="bold">
      <text x="0" y="0" fill="#00E5FF">Suricata IDS/IPS</text>
      <text x="170" y="0" fill="#00FF66">DDoS Filter Active</text>
      <text x="410" y="0" fill="#00FF66" text-anchor="end">HARDENED</text>
    </g>

    <g transform="translate(0, 105)" font-size="11" font-weight="bold">
      <text x="0" y="0" fill="#9D00FF">CrowdSec Bouncer</text>
      <text x="170" y="0" fill="#00FF66">182 Bad IPs Banned</text>
      <text x="410" y="0" fill="#00FF66" text-anchor="end">PROTECTED</text>
    </g>

    <g transform="translate(0, 130)" font-size="11" font-weight="bold">
      <text x="0" y="0" fill="#00FF66">Nmap Security Audit</text>
      <text x="170" y="0" fill="#00FF66">Ports 80, 443 Strict</text>
      <text x="410" y="0" fill="#00FF66" text-anchor="end">PASSED</text>
    </g>
  </g>

  <!-- MIDDLE SECTION: NETWORK PROTOCOLS -->
  <g transform="translate(25, 240)" font-family="'JetBrains Mono', monospace">
    <text x="0" y="0" font-size="11" font-weight="900" fill="#00E5FF">
      🌐 HIGH-FREQUENCY NETWORK PROTOCOLS &amp; STREAMING PIPELINES
    </text>
    <line x1="0" y1="10" x2="850" y2="10" stroke="#1E293B" stroke-width="1" />

    <g transform="translate(0, 30)" font-size="11" font-weight="bold">
      <text x="0" y="0" fill="#244255">gRPC / HTTP/2</text>
      <text x="120" y="0" fill="#00FF66">0.12ms [ProtoBuf]</text>

      <text x="280" y="0" fill="#00E5FF">WebSocket (WSS)</text>
      <text x="420" y="0" fill="#00FF66">Live Telemetry</text>

      <text x="570" y="0" fill="#FF9900">Apache Kafka</text>
      <text x="700" y="0" fill="#00FF66">1.2M msgs/sec 🚀</text>
    </g>

    <g transform="translate(0, 55)" font-size="11" font-weight="bold">
      <text x="0" y="0" fill="#00FF66">QUIC / HTTP/3</text>
      <text x="120" y="0" fill="#00FF66">0-RTT Connect</text>

      <text x="280" y="0" fill="#9D00FF">MQTT v5.0</text>
      <text x="420" y="0" fill="#00FF66">IoT Stream</text>

      <text x="570" y="0" fill="#FF6600">RabbitMQ</text>
      <text x="700" y="0" fill="#00FF66">AMQP 0.9.1 Active</text>
    </g>
  </g>

  <!-- RAPID HIGH-SPEED PACKET FLOW (1.2s DURATION) -->
  <g transform="translate(25, 350)">
    <rect x="0" y="0" width="850" height="28" rx="5" fill="#020814" stroke="#00E5FF" stroke-width="1" />
    <text x="15" y="18" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="bold" fill="#00FF66">
      HIGH-SPEED PACKET STREAM:
    </text>

    <g transform="translate(180, 8)">
      <circle cx="10" cy="6" r="5" fill="#00FF66" filter="url(#glowGreen)">
        <animate attributeName="cx" values="10;630;10" dur="1.2s" repeatCount="indefinite" />
      </circle>
      <circle cx="120" cy="6" r="5" fill="#00E5FF" filter="url(#glowCyan)">
        <animate attributeName="cx" values="120;630;10" dur="1.0s" repeatCount="indefinite" />
      </circle>
      <circle cx="250" cy="6" r="5" fill="#FF0055" filter="url(#glowRed)">
        <animate attributeName="cx" values="250;630;10" dur="1.4s" repeatCount="indefinite" />
      </circle>
      <circle cx="380" cy="6" r="5" fill="#FF9900">
        <animate attributeName="cx" values="380;630;10" dur="0.9s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>

  <!-- BOTTOM CI/CD LIVE BUILD -->
  <g transform="translate(25, 410)" font-family="'JetBrains Mono', monospace">
    <text x="0" y="0" font-size="11" font-weight="900" fill="#00FF66">
      🛠️ LIVE CI/CD BUILD PIPELINE &amp; INTEGRATION MATRIX
    </text>
    <line x1="0" y1="10" x2="850" y2="10" stroke="#1E293B" stroke-width="1" />

    <g transform="translate(0, 30)" font-size="11" font-weight="bold">
      <text x="0" y="0" fill="#F8FAFC">Cargo Build (Rust): <tspan fill="#00FF66">PASSED (0.4s)</tspan></text>
      <text x="300" y="0" fill="#F8FAFC">npm / pnpm: <tspan fill="#00FF66">BUILD SUCCESS</tspan></text>
      <text x="580" y="0" fill="#F8FAFC">Unit Tests: <tspan fill="#00FF66">100% (412 Passed)</tspan></text>
    </g>

    <g transform="translate(0, 52)" font-size="11" font-weight="bold">
      <text x="0" y="0" fill="#F8FAFC">Docker Build: <tspan fill="#00FF66">OPTIMIZED (LMM-v5.0)</tspan></text>
      <text x="300" y="0" fill="#F8FAFC">GitHub Actions: <tspan fill="#00FF66">WORKFLOW SUCCESS</tspan></text>
      <text x="580" y="0" fill="#F8FAFC">Code Coverage: <tspan fill="#00FF66">98.4% COVERAGE</tspan></text>
    </g>
  </g>
</svg>
