<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" width="100%" height="240">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040817" />
      <stop offset="50%" stop-color="#081028" />
      <stop offset="100%" stop-color="#02040A" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0F1F42" stroke-width="0.8" stroke-dasharray="2,2" />
    </pattern>
  </defs>

  <!-- Frame Base -->
  <rect width="420" height="240" rx="14" fill="url(#bgGrad)" stroke="#00FFFF" stroke-width="1.5" filter="url(#glowCyan)" opacity="0.85" />
  <rect width="420" height="240" rx="14" fill="url(#bgGrad)" stroke="#00FF88" stroke-width="0.8" />
  <rect width="420" height="240" rx="14" fill="url(#grid)" opacity="0.6" />

  <!-- Header -->
  <rect x="15" y="14" width="390" height="34" rx="6" fill="#091638" stroke="#1E293B" stroke-width="1" />
  <text x="30" y="36" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="900" fill="#00FFFF">
    ⚡ MOST USED LANGUAGES &amp; STACK
  </text>
  <circle cx="385" cy="31" r="5" fill="#00FF88" filter="url(#glowGreen)">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite" />
  </circle>

  <!-- Language 1: Python -->
  <g transform="translate(25, 65)">
    <text x="0" y="14" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#F8FAFC">Python</text>
    <text x="370" y="14" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#00FF88" text-anchor="end">42.5%</text>
    <rect x="0" y="22" width="370" height="10" rx="5" fill="#0A1836" />
    <rect x="0" y="22" width="157" height="10" rx="5" fill="#00FF88" filter="url(#glowGreen)">
      <animate attributeName="width" values="157;165;150;157" dur="3s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Language 2: C++ & Rust -->
  <g transform="translate(25, 105)">
    <text x="0" y="14" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#F8FAFC">C++ / Rust / Go</text>
    <text x="370" y="14" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#00D4FF" text-anchor="end">26.8%</text>
    <rect x="0" y="22" width="370" height="10" rx="5" fill="#0A1836" />
    <rect x="0" y="22" width="99" height="10" rx="5" fill="#00D4FF" filter="url(#glowCyan)">
      <animate attributeName="width" values="99;106;93;99" dur="2.5s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Language 3: JavaScript & TypeScript -->
  <g transform="translate(25, 145)">
    <text x="0" y="14" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#F8FAFC">TypeScript / JS</text>
    <text x="370" y="14" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#FF007F" text-anchor="end">18.2%</text>
    <rect x="0" y="22" width="370" height="10" rx="5" fill="#0A1836" />
    <rect x="0" y="22" width="67" height="10" rx="5" fill="#FF007F">
      <animate attributeName="width" values="67;74;62;67" dur="2.8s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Language 4: PHP & SQL -->
  <g transform="translate(25, 185)">
    <text x="0" y="14" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#F8FAFC">PHP / SQL / HTML</text>
    <text x="370" y="14" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#9D00FF" text-anchor="end">12.5%</text>
    <rect x="0" y="22" width="370" height="10" rx="5" fill="#0A1836" />
    <rect x="0" y="22" width="46" height="10" rx="5" fill="#9D00FF" />
  </g>
</svg>
