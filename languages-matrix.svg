<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 330" width="100%" height="330">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030718" />
      <stop offset="50%" stop-color="#07122C" />
      <stop offset="100%" stop-color="#01030B" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glowGold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0F1F44" stroke-width="0.8" stroke-dasharray="2,2" />
    </pattern>
  </defs>

  <!-- Frame Base -->
  <rect width="460" height="330" rx="14" fill="url(#bgGrad)" stroke="#00FFFF" stroke-width="1.6" filter="url(#glowCyan)" opacity="0.88" />
  <rect width="460" height="330" rx="14" fill="url(#bgGrad)" stroke="#00FF88" stroke-width="0.8" />
  <rect width="460" height="330" rx="14" fill="url(#grid)" opacity="0.65" />

  <!-- Header -->
  <rect x="15" y="14" width="430" height="36" rx="8" fill="#08183B" stroke="#1E293B" stroke-width="1.2" />
  <text x="30" y="37" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="900" fill="#00FFFF">
    ⚡ FULL-STACK &amp; QUANT LANGUAGES TELEMETRY
  </text>
  <circle cx="425" cy="32" r="5" fill="#00FF88" filter="url(#glowGreen)">
    <animate attributeName="opacity" values="1;0.3;1" dur="0.9s" repeatCount="indefinite" />
  </circle>

  <!-- Language 1: Python / AI / ML -->
  <g transform="translate(25, 62)">
    <text x="0" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#F8FAFC">🐍 Python (AI / ML / Quant)</text>
    <text x="410" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#00FF88" text-anchor="end">35.4%</text>
    <rect x="0" y="18" width="410" height="9" rx="4.5" fill="#0A1836" />
    <rect x="0" y="18" width="145" height="9" rx="4.5" fill="#00FF88" filter="url(#glowGreen)">
      <animate attributeName="width" values="145;155;138;145" dur="1.8s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Language 2: C++ / Rust / Go -->
  <g transform="translate(25, 94)">
    <text x="0" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#F8FAFC">⚡ C++ / Rust / Go (HFT / Systems)</text>
    <text x="410" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#00D4FF" text-anchor="end">22.8%</text>
    <rect x="0" y="18" width="410" height="9" rx="4.5" fill="#0A1836" />
    <rect x="0" y="18" width="93" height="9" rx="4.5" fill="#00D4FF" filter="url(#glowCyan)">
      <animate attributeName="width" values="93;102;88;93" dur="1.8s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Language 3: Java & Ruby -->
  <g transform="translate(25, 126)">
    <text x="0" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#F8FAFC">☕ Java / Ruby (Backend &amp; Enterprise)</text>
    <text x="410" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#FFD700" text-anchor="end">14.2%</text>
    <rect x="0" y="18" width="410" height="9" rx="4.5" fill="#0A1836" />
    <rect x="0" y="18" width="58" height="9" rx="4.5" fill="#FFD700" filter="url(#glowGold)">
      <animate attributeName="width" values="58;65;53;58" dur="1.8s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Language 4: TypeScript / JavaScript -->
  <g transform="translate(25, 158)">
    <text x="0" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#F8FAFC">🌐 TypeScript / JavaScript (React/Next)</text>
    <text x="410" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#FF007F" text-anchor="end">11.5%</text>
    <rect x="0" y="18" width="410" height="9" rx="4.5" fill="#0A1836" />
    <rect x="0" y="18" width="47" height="9" rx="4.5" fill="#FF007F">
      <animate attributeName="width" values="47;54;42;47" dur="1.8s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Language 5: PHP / Laravel / WordPress -->
  <g transform="translate(25, 190)">
    <text x="0" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#F8FAFC">🐘 PHP / Laravel / WordPress</text>
    <text x="410" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#9D00FF" text-anchor="end">7.6%</text>
    <rect x="0" y="18" width="410" height="9" rx="4.5" fill="#0A1836" />
    <rect x="0" y="18" width="31" height="9" rx="4.5" fill="#9D00FF">
      <animate attributeName="width" values="31;37;27;31" dur="1.8s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Language 6: SQL / PostgreSQL / Redis -->
  <g transform="translate(25, 222)">
    <text x="0" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#F8FAFC">🗄️ SQL / PostgreSQL / Redis</text>
    <text x="410" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#38BDF8" text-anchor="end">4.8%</text>
    <rect x="0" y="18" width="410" height="9" rx="4.5" fill="#0A1836" />
    <rect x="0" y="18" width="20" height="9" rx="4.5" fill="#38BDF8">
      <animate attributeName="width" values="20;25;16;20" dur="1.8s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Language 7: PineScript (TradingView Quant) -->
  <g transform="translate(25, 254)">
    <text x="0" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#F8FAFC">📈 PineScript (TradingView Algo)</text>
    <text x="410" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#A3E635" text-anchor="end">2.2%</text>
    <rect x="0" y="18" width="410" height="9" rx="4.5" fill="#0A1836" />
    <rect x="0" y="18" width="12" height="9" rx="4.5" fill="#A3E635">
      <animate attributeName="width" values="12;16;9;12" dur="1.8s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Language 8: Solidity / Web3 -->
  <g transform="translate(25, 286)">
    <text x="0" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#F8FAFC">💎 Solidity / Web3 (DeFi Contracts)</text>
    <text x="410" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#22D3EE" text-anchor="end">1.5%</text>
    <rect x="0" y="18" width="410" height="9" rx="4.5" fill="#0A1836" />
    <rect x="0" y="18" width="8" height="9" rx="4.5" fill="#22D3EE" />
  </g>
</svg>
