<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 330" width="100%" height="330">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02050A" />
      <stop offset="50%" stop-color="#08101E" />
      <stop offset="100%" stop-color="#010205" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00FF41" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.3" />
    </pattern>
  </defs>

  <!-- Frame Base -->
  <rect width="460" height="330" rx="14" fill="url(#bgGrad)" stroke="#00FF41" stroke-width="1.8" filter="url(#glowGreen)" opacity="0.9" />
  <rect width="460" height="330" rx="14" fill="url(#bgGrad)" stroke="#FF003C" stroke-width="0.8" />
  <rect width="460" height="330" rx="14" fill="url(#grid)" opacity="0.5" />

  <!-- Header -->
  <rect x="15" y="14" width="430" height="36" rx="8" fill="#06120A" stroke="#00FF41" stroke-width="1.2" />
  <text x="30" y="37" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="900" fill="#00FF41">
    ☠️ OFFENSIVE STACK &amp; QUANT TELEMETRY
  </text>
  <circle cx="425" cy="32" r="5" fill="#FF003C" filter="url(#glowRed)">
    <animate attributeName="opacity" values="1;0.2;1" dur="0.7s" repeatCount="indefinite" />
  </circle>

  <!-- Language 1: Python / AI / ML -->
  <g transform="translate(25, 62)">
    <text x="0" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#00FF41">🐍 Python (Offensive Exploits / AI / Quant)</text>
    <text x="410" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#00FF41" text-anchor="end">35.4%</text>
    <rect x="0" y="18" width="410" height="9" rx="4.5" fill="#031407" />
    <rect x="0" y="18" width="145" height="9" rx="4.5" fill="#00FF41" filter="url(#glowGreen)">
      <animate attributeName="width" values="145;155;138;145" dur="1.6s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Language 2: C++ / Rust / Go -->
  <g transform="translate(25, 94)">
    <text x="0" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#FF003C">☠️ C++ / Rust / Go (Kernel Exploits / HFT)</text>
    <text x="410" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#FF003C" text-anchor="end">22.8%</text>
    <rect x="0" y="18" width="410" height="9" rx="4.5" fill="#1A0409" />
    <rect x="0" y="18" width="93" height="9" rx="4.5" fill="#FF003C" filter="url(#glowRed)">
      <animate attributeName="width" values="93;102;88;93" dur="1.6s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Language 3: Java & Ruby -->
  <g transform="translate(25, 126)">
    <text x="0" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#FFB000">☕ Java / Ruby (Reverse Engineering / Payload)</text>
    <text x="410" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#FFB000" text-anchor="end">14.2%</text>
    <rect x="0" y="18" width="410" height="9" rx="4.5" fill="#140E03" />
    <rect x="0" y="18" width="58" height="9" rx="4.5" fill="#FFB000">
      <animate attributeName="width" values="58;65;53;58" dur="1.6s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Language 4: TypeScript / JavaScript -->
  <g transform="translate(25, 158)">
    <text x="0" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#00F0FF">🌐 TypeScript / JS (Web Exploit / XSS Payload)</text>
    <text x="410" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#00F0FF" text-anchor="end">11.5%</text>
    <rect x="0" y="18" width="410" height="9" rx="4.5" fill="#03131A" />
    <rect x="0" y="18" width="47" height="9" rx="4.5" fill="#00F0FF">
      <animate attributeName="width" values="47;54;42;47" dur="1.6s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Language 5: PHP / SQL -->
  <g transform="translate(25, 190)">
    <text x="0" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#9D00FF">🐘 PHP / Laravel (SQLi Audit / Hardening)</text>
    <text x="410" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#9D00FF" text-anchor="end">7.6%</text>
    <rect x="0" y="18" width="410" height="9" rx="4.5" fill="#10031A" />
    <rect x="0" y="18" width="31" height="9" rx="4.5" fill="#9D00FF">
      <animate attributeName="width" values="31;37;27;31" dur="1.6s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Language 6: SQL / PostgreSQL / Redis -->
  <g transform="translate(25, 222)">
    <text x="0" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#FF007F">🗄️ SQL / PostgreSQL / Redis (DB Hardening)</text>
    <text x="410" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#FF007F" text-anchor="end">4.8%</text>
    <rect x="0" y="18" width="410" height="9" rx="4.5" fill="#1A0310" />
    <rect x="0" y="18" width="20" height="9" rx="4.5" fill="#FF007F">
      <animate attributeName="width" values="20;25;16;20" dur="1.6s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Language 7: PineScript (Quant Arbitrage) -->
  <g transform="translate(25, 254)">
    <text x="0" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#A3E635">📈 PineScript (Quant HFT Signals)</text>
    <text x="410" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#A3E635" text-anchor="end">2.2%</text>
    <rect x="0" y="18" width="410" height="9" rx="4.5" fill="#0E1403" />
    <rect x="0" y="18" width="12" height="9" rx="4.5" fill="#A3E635">
      <animate attributeName="width" values="12;16;9;12" dur="1.6s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Language 8: Solidity / Web3 -->
  <g transform="translate(25, 286)">
    <text x="0" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#22D3EE">💎 Solidity / Web3 (DeFi Smart Contract Audit)</text>
    <text x="410" y="12" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#22D3EE" text-anchor="end">1.5%</text>
    <rect x="0" y="18" width="410" height="9" rx="4.5" fill="#031214" />
    <rect x="0" y="18" width="8" height="9" rx="4.5" fill="#22D3EE" />
  </g>
</svg>
