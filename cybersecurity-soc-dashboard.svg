<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="100%" height="320">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="50%" stop-color="#0E1626" />
      <stop offset="100%" stop-color="#020408" />
    </linearGradient>

    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#7B61FF" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.15" />
    </pattern>
  </defs>

  <rect width="900" height="320" rx="10" fill="url(#bgGrad)" stroke="#7B61FF" stroke-width="1.6" filter="url(#glowBlue)" />
  <rect width="900" height="320" rx="10" fill="url(#grid)" />

  <!-- TOP TITLE BAR -->
  <rect x="14" y="14" width="872" height="36" rx="6" fill="#08111F" stroke="#7B61FF" stroke-width="0.8" />
  <circle cx="36" cy="32" r="5" fill="#FF0055" />
  <circle cx="53" cy="32" r="5" fill="#FFB000" />
  <circle cx="70" cy="32" r="5" fill="#00F5FF" />
  <text x="92" y="36" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="900" fill="#7B61FF" letter-spacing="1">
    🛡️ CYBERSECURITY SOC DASHBOARD <tspan fill="#FFFFFF">| ZERO-TRUST SENTINEL HARDENING</tspan>
  </text>
  <circle cx="865" cy="32" r="4" fill="#00F5FF" filter="url(#glowBlue)">
    <animate attributeName="opacity" values="1;0.2;1" dur="0.5s" repeatCount="indefinite" />
  </circle>

  <!-- LEFT: ANIMATED SHIELD & THREAT LEVEL (WIDTH 260) -->
  <g transform="translate(25, 65)" font-family="'JetBrains Mono', monospace">
    <rect x="0" y="0" width="240" height="235" rx="6" fill="#0A1424" stroke="#7B61FF" stroke-width="1" />
    
    <!-- Shield Graphic -->
    <g transform="translate(120, 70)">
      <path d="M 0 -45 L 35 -20 L 35 20 Q 35 50 0 65 Q -35 50 -35 20 L -35 -20 Z" fill="#7B61FF" opacity="0.2" stroke="#00F5FF" stroke-width="2" filter="url(#glowBlue)">
        <animate attributeName="stroke" values="#00F5FF;#7B61FF;#00F5FF" dur="2s" repeatCount="indefinite" />
      </path>
      <text x="0" y="10" font-size="20" text-anchor="middle" fill="#00F5FF">🛡️</text>
    </g>

    <text x="120" y="170" font-size="11" font-weight="900" fill="#00F5FF" text-anchor="middle">SYSTEM HARDENED</text>
    <text x="120" y="190" font-size="10" font-weight="bold" fill="#50FA7B" text-anchor="middle">THREAT LEVEL: LOW (0 CVE)</text>
    <text x="120" y="210" font-size="9" font-weight="bold" fill="#8899A6" text-anchor="middle">4,892 ATTACKS BLOCKED/DAY</text>
  </g>

  <!-- RIGHT: SECURITY GAUGES & NETWORK MONITOR (WIDTH 580) -->
  <g transform="translate(280, 65)" font-family="'JetBrains Mono', monospace">
    <rect x="0" y="0" width="595" height="235" rx="6" fill="#0A1424" stroke="#7B61FF" stroke-width="1" />
    <text x="15" y="22" font-size="11" font-weight="900" fill="#7B61FF">⚡ ACTIVE SECURITY CONTROLS &amp; WAF PROTECTION</text>
    <line x1="15" y1="30" x2="580" y2="30" stroke="#1E293B" stroke-width="1" />

    <g font-size="11" font-weight="bold" transform="translate(15, 48)">
      <text y="0" fill="#FFFFFF">OWASP Top 10 Protection:</text>
      <text x="220" y="0" fill="#50FA7B">100% SHIELDED</text>
      <text x="420" y="0" fill="#00F5FF">0 VULNERABILITIES</text>

      <text y="28" fill="#FFFFFF">Burp Suite &amp; Nmap Audit:</text>
      <text x="220" y="28" fill="#50FA7B">AUDIT PASSED</text>
      <text x="420" y="28" fill="#00F5FF">PORTS HARDENED</text>

      <text y="56" fill="#FFFFFF">Suricata IDS/IPS:</text>
      <text x="220" y="56" fill="#50FA7B">ACTIVE FILTERING</text>
      <text x="420" y="56" fill="#00F5FF">0.1ms INSPECTION</text>

      <text y="84" fill="#FFFFFF">CrowdSec WAF Bouncer:</text>
      <text x="220" y="84" fill="#50FA7B">182 IPs BANNED</text>
      <text x="420" y="84" fill="#50FA7B">PROTECTED</text>
    </g>

    <!-- LIVE NETWORK PACKET MONITOR ANIMATION BAR -->
    <g transform="translate(15, 160)">
      <text font-size="10" font-weight="900" fill="#00F5FF">REALTIME NETWORK TRAFFIC &amp; PACKET FLOW INSPECTOR</text>
      <rect x="0" y="10" width="565" height="28" rx="4" fill="#040A14" stroke="#7B61FF" stroke-width="1" />
      
      <g transform="translate(15, 18)">
        <circle cx="10" cy="5" r="4" fill="#50FA7B" filter="url(#glowBlue)">
          <animate attributeName="cx" values="10;530;10" dur="1.4s" repeatCount="indefinite" />
        </circle>
        <circle cx="120" cy="5" r="4" fill="#00F5FF">
          <animate attributeName="cx" values="120;530;10" dur="1.1s" repeatCount="indefinite" />
        </circle>
        <circle cx="250" cy="5" r="4" fill="#7B61FF">
          <animate attributeName="cx" values="250;530;10" dur="1.6s" repeatCount="indefinite" />
        </circle>
      </g>
    </g>
  </g>
</svg>
