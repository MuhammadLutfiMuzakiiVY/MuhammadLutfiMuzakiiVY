<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="100%" height="340">
  <defs>
    <linearGradient id="hackerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020503" />
      <stop offset="50%" stop-color="#05150A" />
      <stop offset="100%" stop-color="#010804" />
    </linearGradient>

    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <pattern id="matrixGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00FF66" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.2" />
    </pattern>
  </defs>

  <!-- IDE Window Frame -->
  <rect width="900" height="340" rx="10" fill="url(#hackerBg)" stroke="#00FF66" stroke-width="1.8" filter="url(#glowGreen)" />
  <rect width="900" height="340" rx="10" fill="url(#matrixGrid)" />

  <!-- VS CODE HACKER HEADER TAB BAR -->
  <rect x="14" y="14" width="872" height="36" rx="6" fill="#05150A" stroke="#00FF66" stroke-width="0.8" />
  <circle cx="36" cy="32" r="5" fill="#FF0055" />
  <circle cx="53" cy="32" r="5" fill="#FFB000" />
  <circle cx="70" cy="32" r="5" fill="#00FF66" filter="url(#glowGreen)" />

  <!-- IDE Window Tabs -->
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">
    <rect x="92" y="20" width="135" height="24" rx="4" fill="#082210" stroke="#00FF66" stroke-width="1" />
    <text x="106" y="36" fill="#00FF66">💀 kernel_exploit.rs</text>

    <rect x="234" y="20" width="130" height="24" rx="4" fill="#041007" stroke="#1E293B" stroke-width="1" />
    <text x="246" y="36" fill="#00F5FF">⚡ ebpf_filter.c</text>

    <rect x="371" y="20" width="125" height="24" rx="4" fill="#041007" stroke="#1E293B" stroke-width="1" />
    <text x="383" y="36" fill="#7B61FF">🧠 zero_day.py</text>
  </g>

  <!-- SIDEBAR SIMULATION -->
  <g transform="translate(14, 52)">
    <rect x="0" y="0" width="45" height="274" fill="#020904" />
    <text x="14" y="35" font-size="14" fill="#00FF66">📁</text>
    <text x="14" y="75" font-size="14" fill="#00F5FF">🔍</text>
    <text x="14" y="115" font-size="14" fill="#7B61FF">🌿</text>
    <text x="14" y="155" font-size="14" fill="#FF0055">💀</text>
    <text x="14" y="195" font-size="14" fill="#00FF66">⚙️</text>
  </g>

  <!-- SCANNING RADAR LASER LINE -->
  <line x1="60" y1="52" x2="880" y2="52" stroke="#00FF66" stroke-width="1.5" filter="url(#glowGreen)" opacity="0.7">
    <animate attributeName="y1" values="52;320;52" dur="2s" repeatCount="indefinite" />
    <animate attributeName="y2" values="52;320;52" dur="2s" repeatCount="indefinite" />
  </line>

  <!-- RAPIDLY MOVING HACKER CODE STREAM -->
  <g font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="11" font-weight="900" transform="translate(75, 70)">

    <!-- Line Numbers Column -->
    <g fill="#00FF66" opacity="0.4" font-size="10">
      <text y="0">01</text>
      <text y="18">02</text>
      <text y="36">03</text>
      <text y="54">04</text>
      <text y="72">05</text>
      <text y="90">06</text>
      <text y="108">07</text>
      <text y="126">08</text>
      <text y="144">09</text>
      <text y="162">10</text>
      <text y="180">11</text>
      <text y="198">12</text>
      <text y="216">13</text>
      <text y="234">14</text>
    </g>

    <!-- RAPID SCROLLING CODE BLOCK (ANIMATION 3s INFINITE LOOP) -->
    <g transform="translate(30, 0)">
      <g>
        <!-- Line 1 -->
        <text y="0" fill="#00FF66" filter="url(#glowGreen)">// UNSAFE KERNEL SPACE EXPLOIT &amp; ASLR BYPASS HARNESS</text>
        
        <!-- Line 2 -->
        <text y="18">
          <tspan fill="#FF0055">pub unsafe fn</tspan> <tspan fill="#00F5FF">inject_ebpf_kernel_filter</tspan>(sock: <tspan fill="#7B61FF">RawFd</tspan>) -&gt; <tspan fill="#00FF66">Result&lt;(), KernelErr&gt;</tspan> {
        </text>

        <!-- Line 3 -->
        <text y="36">
          <tspan fill="#FFFFFF">    let</tspan> payload: [<tspan fill="#7B61FF">u8</tspan>; 32] = [<tspan fill="#00F5FF">0x90, 0x90, 0x31, 0xc0, 0x50, 0x68, 0x2f, 0x2f, 0x73, 0x68</tspan>];
        </text>

        <!-- Line 4 -->
        <text y="54">
          <tspan fill="#FFFFFF">    asm!</tspan>(<tspan fill="#00FF66">"mov rax, 0x59"</tspan>, <tspan fill="#00FF66">"syscall"</tspan>, in(<tspan fill="#00F5FF">"rdi"</tspan>) payload.as_ptr());
        </text>

        <!-- Line 5 -->
        <text y="72">
          <tspan fill="#FF0055">    if</tspan> <tspan fill="#00F5FF">sys_ptr_read</tspan>(<tspan fill="#00FF66">0x7FFF9A8B0000</tspan>) != <tspan fill="#00FF66">0xDEADBEEF</tspan> { <tspan fill="#FF0055">return Err(KernelErr::BypassFailed);</tspan> }
        </text>

        <!-- Line 6 -->
        <text y="90" fill="#FFFFFF">}</text>

        <!-- Line 7 -->
        <text y="112" fill="#00F5FF">[+] MEMORY SCANNER: 0x7FFE00000000 -&gt; HOOKED (0.0001s)</text>
        <text y="130" fill="#00FF66">[+] ASLR DEFEATED • DEP BYPASSED • SHELLCODE EXECUTED IN KERNEL SPACE</text>
        <text y="148" fill="#7B61FF">[+] OVERFLOW BUFFER INJECTED: 1,850,000 PACKETS/SEC ROUTED TO RING 0</text>

        <!-- Line 8 -->
        <text y="170" fill="#00FF66">$ cargo run --bin zero_day --release <tspan fill="#FFFFFF">[EXPLOIT SUCCESSFUL]</tspan></text>
        <text y="188" fill="#00F5FF">$ nmap -sS -sV -p- 192.168.1.1 <tspan fill="#00FF66">[ALL 65535 PORTS SCANNED IN 0.05s]</tspan></text>
        <text y="206" fill="#7B61FF">$ msfconsole -x "use exploit/linux/local; run" <tspan fill="#00FF66">[ROOT SHELL GRANTED]</tspan></text>
        <text y="224" fill="#00FF66">root@kernel-sentinel:~# <tspan fill="#FFFFFF">cat /etc/shadow | grep root [ACCESS GRANTED]</tspan></text>

        <!-- RAPID UPWARD SCROLLING ANIMATION -->
        <animateTransform attributeName="transform" type="translate" values="0, 0; 0, -40; 0, 0" dur="2.5s" repeatCount="indefinite" />
      </g>
    </g>

    <!-- BLINKING HACKER CURSOR -->
    <rect x="520" y="215" width="10" height="16" fill="#00FF66" filter="url(#glowGreen)">
      <animate attributeName="opacity" values="1;0;1" dur="0.2s" repeatCount="indefinite" />
    </rect>

  </g>
</svg>
