<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="100%" height="320">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="50%" stop-color="#091322" />
      <stop offset="100%" stop-color="#03060C" />
    </linearGradient>

    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00F5FF" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.15" />
    </pattern>
  </defs>

  <!-- IDE Window Frame -->
  <rect width="900" height="320" rx="10" fill="url(#bgGrad)" stroke="#00F5FF" stroke-width="1.6" filter="url(#glowCyan)" />
  <rect width="900" height="320" rx="10" fill="url(#grid)" />

  <!-- VS CODE HEADER TAB BAR -->
  <rect x="14" y="14" width="872" height="36" rx="6" fill="#08111F" stroke="#00C8FF" stroke-width="0.8" />
  <circle cx="36" cy="32" r="5" fill="#FF0055" />
  <circle cx="53" cy="32" r="5" fill="#FFB000" />
  <circle cx="70" cy="32" r="5" fill="#00F5FF" />

  <!-- IDE Window Tabs -->
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold">
    <rect x="92" y="20" width="115" height="24" rx="4" fill="#101D33" stroke="#00F5FF" stroke-width="1" />
    <text x="106" y="36" fill="#00F5FF">🦀 auth.rs</text>

    <rect x="214" y="20" width="125" height="24" rx="4" fill="#0A1424" stroke="#1E293B" stroke-width="1" />
    <text x="226" y="36" fill="#3178C6">📘 server.ts</text>

    <rect x="346" y="20" width="120" height="24" rx="4" fill="#0A1424" stroke="#1E293B" stroke-width="1" />
    <text x="358" y="36" fill="#3776AB">🐍 model.py</text>
  </g>

  <!-- VS CODE SIDEBAR SIMULATION (LEFT 40px) -->
  <g transform="translate(14, 52)">
    <rect x="0" y="0" width="45" height="254" fill="#040A14" />
    <!-- Sidebar Icons -->
    <text x="14" y="35" font-size="14" fill="#00F5FF">📁</text>
    <text x="14" y="75" font-size="14" fill="#7B61FF">🔍</text>
    <text x="14" y="115" font-size="14" fill="#00C8FF">🌿</text>
    <text x="14" y="155" font-size="14" fill="#00F5FF">🐛</text>
    <text x="14" y="195" font-size="14" fill="#FFFFFF">⚙️</text>
  </g>

  <!-- CODE EDITOR WORKSPACE AREA -->
  <g font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="11" font-weight="bold" transform="translate(75, 72)">

    <!-- Line Numbers -->
    <g fill="#475569" font-size="10">
      <text y="0">01</text>
      <text y="20">02</text>
      <text y="40">03</text>
      <text y="60">04</text>
      <text y="80">05</text>
      <text y="100">06</text>
      <text y="120">07</text>
      <text y="140">08</text>
      <text y="160">09</text>
      <text y="180">10</text>
      <text y="200">11</text>
    </g>

    <!-- Syntax Highlighted Live Code Snippets -->
    <g transform="translate(30, 0)">
      <!-- Line 1 -->
      <text y="0" fill="#6272A4">// High-Performance System Authentication &amp; Zero-Trust Hardening</text>

      <!-- Line 2 -->
      <text y="20">
        <tspan fill="#FF79C6">pub async fn</tspan> <tspan fill="#50FA7B">authenticate</tspan>(user: &amp;<tspan fill="#8BE9FD">UserCredentials</tspan>) -&gt; <tspan fill="#BD93F9">Result&lt;Session&gt;</tspan> {
      </text>

      <!-- Line 3 -->
      <text y="40">
        <tspan fill="#F8FAFC">    let</tspan> token = <tspan fill="#50FA7B">SecurityKernel::verify_jwt</tspan>(&amp;user.token).<tspan fill="#50FA7B">await</tspan>?;
      </text>

      <!-- Line 4 -->
      <text y="60">
        <tspan fill="#F8FAFC">    let</tspan> db_user = <tspan fill="#50FA7B">query!</tspan>(<tspan fill="#F1FA8C">"SELECT * FROM users WHERE id = $1 AND status = 'ACTIVE'"</tspan>, token.sub).<tspan fill="#50FA7B">fetch_one</tspan>(&amp;pool).<tspan fill="#50FA7B">await</tspan>?;
      </text>

      <!-- Line 5 -->
      <text y="80">
        <tspan fill="#FF79C6">    Ok</tspan>(Session::new(db_user))
      </text>

      <!-- Line 6 -->
      <text y="100" fill="#F8FAFC">}</text>

      <!-- Line 7: Commands Stream -->
      <text y="130" fill="#6272A4">// Integrated Terminal Commands Execution Stream</text>
      <text y="150" fill="#00F5FF">$ cargo build --release <tspan fill="#50FA7B">[Finished release in 0.42s]</tspan></text>
      <text y="170" fill="#00F5FF">$ docker compose up -d <tspan fill="#50FA7B">[Container postgres-cluster Running]</tspan></text>
      <text y="190" fill="#00F5FF">$ kubectl get pods -n production <tspan fill="#50FA7B">[STATUS: 128/128 Running]</tspan></text>
      <text y="210" fill="#00F5FF">$ git push origin main <tspan fill="#50FA7B">[Everything up-to-date]</tspan></text>
    </g>

  </g>
</svg>
