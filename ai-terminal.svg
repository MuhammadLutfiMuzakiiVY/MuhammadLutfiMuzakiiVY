    <text x="140" y="0">INFERENCE/SEC</text>
    <text x="280" y="0">LATENCY</text>
    <text x="390" y="0">CONTEXT WINDOW</text>
    <text x="540" y="0">GPU UTILIZATION</text>
    <text x="680" y="0">ACCURACY</text>
    <text x="790" y="0">EMBED SPEED</text>
    <line x1="0" y1="10" x2="850" y2="10" stroke="#1E293B" stroke-width="1" />
  </g>

  <!-- AI MODEL ROWS (11 MODELS WITH RAPID FLICKERING GPU GAUGES) -->
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" transform="translate(25, 98)">

    <!-- 1. GPT-5.5 -->
    <g transform="translate(0, 0)">
      <text x="10" y="0" fill="#00FF66">GPT-5.5 (OpenAI)</text>
      <text x="140" y="0" fill="#00E5FF">345 tok/s</text>
      <text x="280" y="0" fill="#00FF66">8.4 ms</text>
      <text x="390" y="0" fill="#F8FAFC">2,000,000 tok</text>

      <rect x="540" y="-10" width="110" height="12" rx="3" fill="#0D192B" />
