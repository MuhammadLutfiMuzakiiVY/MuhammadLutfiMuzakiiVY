  <!-- RAPID UNDULATING STOCK PRICE WAVEFORM (0.8s DURATION) -->
  <g transform="translate(25, 420)">
    <text x="0" y="-8" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="bold" fill="#00E5FF">
      ⚡ REALTIME STOCK HFT WAVEFORM (MICROSECOND TICK THROUGHPUT)
    </text>
    <path d="M 0 25 Q 100 5 200 20 T 400 15 T 600 30 T 850 10" fill="none" stroke="#00FF66" stroke-width="2.5" filter="url(#glowGreen)">
      <animate attributeName="d" dur="0.8s" repeatCount="indefinite" values="
        M 0 25 Q 100 5 200 20 T 400 15 T 600 30 T 850 10;
        M 0 10 Q 100 35 200 5 T 400 30 T 600 8 T 850 28;
        M 0 30 Q 100 12 200 28 T 400 8 T 600 22 T 850 12;
        M 0 25 Q 100 5 200 20 T 400 15 T 600 30 T 850 10" />
