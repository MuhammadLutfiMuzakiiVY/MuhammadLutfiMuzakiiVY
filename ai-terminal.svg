        <animate attributeName="width" values="105;109;98;105" dur="0.6s" repeatCount="indefinite" />
      </rect>
      <text x="595" y="0" fill="#FFFFFF" font-size="9" font-weight="900" text-anchor="middle">95% (H100 x8)</text>

      <text x="680" y="0" fill="#00FF66">98.9% MMLU</text>
      <text x="790" y="0" fill="#00E5FF">14,200/s</text>
