<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="100%" height="480">
  <defs>
    <linearGradient id="binanceBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0E11" />
      <stop offset="50%" stop-color="#181A20" />
      <stop offset="100%" stop-color="#0B0E11" />
    </linearGradient>

    <filter id="glowYellow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#2B313A" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.4" />
    </pattern>
  </defs>

  <rect width="900" height="480" rx="10" fill="url(#binanceBg)" stroke="#F0B90B" stroke-width="1.6" filter="url(#glowYellow)" />
  <rect width="900" height="480" rx="10" fill="url(#grid)" />

  <!-- TOP TITLE BAR -->
  <rect x="14" y="14" width="872" height="36" rx="6" fill="#181A20" stroke="#2B313A" stroke-width="1" />
  <text x="30" y="36" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="900" fill="#F0B90B" letter-spacing="1">
    🤖 AI CODING AGENT &amp; DEEP LEARNING MODEL TELEMETRY TERMINAL
  </text>
  <circle cx="865" cy="32" r="4" fill="#0ECB81" filter="url(#glowGreen)">
    <animate attributeName="opacity" values="1;0.2;1" dur="0.4s" repeatCount="indefinite" />
  </circle>

  <!-- LEFT: REALTIME INFERENCE THROUGHPUT GRAPH (WIDTH 520) -->
  <g transform="translate(25, 65)">
    <rect x="0" y="0" width="520" height="300" rx="6" fill="#1E2329" stroke="#2B313A" stroke-width="1" />

    <!-- Indicators Legend -->
    <g font-family="'JetBrains Mono', monospace" font-size="9" font-weight="bold" transform="translate(15, 18)">
      <text fill="#F0B90B">Throughput(tok/s): 650</text>
      <text x="145" fill="#9333EA">VRAM(GB): 42GB</text>
      <text x="260" fill="#00E5FF">Latency(ms): 3.1ms</text>
    </g>

    <!-- MOVING INFERENCE WAVEFORM LINE -->
    <path d="M 15 220 Q 150 140 300 170 T 505 80" fill="none" stroke="#F0B90B" stroke-width="1.8" filter="url(#glowYellow)">
      <animate attributeName="d" dur="1.2s" repeatCount="indefinite" values="
        M 15 220 Q 150 140 300 170 T 505 80;
        M 15 200 Q 150 160 300 140 T 505 60;
        M 15 220 Q 150 140 300 170 T 505 80" />
    </path>

    <!-- CANDLESTICKS (TOKENS/SEC SPECTRUM) -->
    <g transform="translate(25, 20)">
      <!-- Candle 1 -->
      <line x1="20" y1="140" x2="20" y2="220" stroke="#0ECB81" stroke-width="1.5" />
      <rect x="13" y="160" width="14" height="45" rx="2" fill="#0ECB81" filter="url(#glowGreen)">
        <animate attributeName="height" values="45;55;38;45" dur="0.8s" repeatCount="indefinite" />
      </rect>

      <!-- Candle 2 -->
      <line x1="60" y1="170" x2="60" y2="240" stroke="#0ECB81" stroke-width="1.5" />
      <rect x="53" y="185" width="14" height="40" rx="2" fill="#0ECB81" />

      <!-- Candle 3 -->
      <line x1="100" y1="120" x2="100" y2="190" stroke="#0ECB81" stroke-width="1.5" />
      <rect x="93" y="135" width="14" height="42" rx="2" fill="#0ECB81" />

      <!-- Candle 4 -->
      <line x1="140" y1="100" x2="140" y2="170" stroke="#0ECB81" stroke-width="1.5" />
      <rect x="133" y="115" width="14" height="48" rx="2" fill="#0ECB81" filter="url(#glowGreen)" />

      <!-- Candle 5 -->
      <line x1="180" y1="80" x2="180" y2="180" stroke="#0ECB81" stroke-width="1.5" />
      <rect x="173" y="95" width="14" height="72" rx="2" fill="#0ECB81" filter="url(#glowGreen)">
        <animate attributeName="height" values="72;82;60;72" dur="0.6s" repeatCount="indefinite" />
      </rect>

      <!-- Candle 6 -->
      <line x1="220" y1="70" x2="220" y2="150" stroke="#0ECB81" stroke-width="1.5" />
      <rect x="213" y="80" width="14" height="55" rx="2" fill="#0ECB81" />

      <!-- Candle 7 -->
      <line x1="260" y1="50" x2="260" y2="130" stroke="#0ECB81" stroke-width="1.5" />
      <rect x="253" y="60" width="14" height="60" rx="2" fill="#0ECB81" filter="url(#glowGreen)" />
    </g>

    <!-- CURSOR SCANNER LINE -->
    <line x1="280" y1="0" x2="280" y2="300" stroke="#F0B90B" stroke-width="1" stroke-dasharray="3,3" opacity="0.8">
      <animate attributeName="x1" values="40;480;40" dur="3s" repeatCount="indefinite" />
      <animate attributeName="x2" values="40;480;40" dur="3s" repeatCount="indefinite" />
    </line>
  </g>

  <!-- RIGHT: AI MODEL BENCHMARKS (WIDTH 320) -->
  <g transform="translate(560, 65)" font-family="'JetBrains Mono', monospace">
    <rect x="0" y="0" width="315" height="300" rx="6" fill="#181A20" stroke="#2B313A" stroke-width="1" />
    <text x="15" y="22" font-size="11" font-weight="900" fill="#F0B90B">🚀 AI MODEL INFERENCE &amp; ACCURACY</text>
    <line x1="15" y1="30" x2="300" y2="30" stroke="#2B313A" stroke-width="1" />

    <g font-size="10" font-weight="bold" transform="translate(15, 48)">
      <!-- Model 1: GPT-5.5 -->
      <text y="0" fill="#EAECEF">GPT-5.5 (OpenAI)</text>
      <text y="14" fill="#848E9C">Context: 2M Tokens</text>
      <text x="180" y="0" fill="#0ECB81">MMLU: 98.9%</text>
      <text x="180" y="14" fill="#0ECB81">345 tok/s</text>
      <line x1="0" y1="24" x2="285" y2="24" stroke="#2B313A" stroke-width="0.8" />

      <!-- Model 2: Claude 3.5 -->
      <g transform="translate(0, 36)">
        <text y="0" fill="#EAECEF">Claude 3.5 Opus</text>
        <text y="14" fill="#848E9C">Context: 1M Tokens</text>
        <text x="180" y="0" fill="#0ECB81">MMLU: 98.4%</text>
        <text x="180" y="14" fill="#0ECB81">280 tok/s</text>
        <line x1="0" y1="24" x2="285" y2="24" stroke="#2B313A" stroke-width="0.8" />
      </g>

      <!-- Model 3: DeepSeek-V3 -->
      <g transform="translate(0, 72)">
        <text y="0" fill="#EAECEF">DeepSeek-V3 (MoE)</text>
        <text y="14" fill="#848E9C">Throughput: 650/s</text>
        <text x="180" y="0" fill="#0ECB81">MMLU: 96.5%</text>
        <text x="180" y="14" fill="#0ECB81">3.1 ms Latency</text>
        <line x1="0" y1="24" x2="285" y2="24" stroke="#2B313A" stroke-width="0.8" />
      </g>

      <!-- Model 4: Gemini 1.5 -->
      <g transform="translate(0, 108)">
        <text y="0" fill="#EAECEF">Gemini 1.5 Pro</text>
        <text y="14" fill="#848E9C">Context: 10M Tokens</text>
        <text x="180" y="0" fill="#0ECB81">MMLU: 97.8%</text>
        <text x="180" y="14" fill="#0ECB81">410 tok/s</text>
        <line x1="0" y1="24" x2="285" y2="24" stroke="#2B313A" stroke-width="0.8" />
      </g>

      <!-- Model 5: Qwen-2.5 -->
      <g transform="translate(0, 144)">
        <text y="0" fill="#EAECEF">Qwen-2.5 72B</text>
        <text y="14" fill="#848E9C">Context: 128K Tokens</text>
        <text x="180" y="0" fill="#0ECB81">MMLU: 95.2%</text>
        <text x="180" y="14" fill="#0ECB81">7.8 ms Latency</text>
      </g>
    </g>
  </g>

  <!-- BOTTOM: VOLATILITY THROUGHPUT WAVEFORM -->
  <g transform="translate(25, 380)">
    <rect x="0" y="0" width="850" height="75" rx="6" fill="#181A20" stroke="#2B313A" stroke-width="1" />
    <text x="15" y="20" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#0ECB81">
      📊 HIGH-SPEED INFERENCE THROUGHPUT WAVEFORM (REALTIME TOKENS/SEC SPECTRUM)
    </text>
    <path d="M 15 50 Q 150 20 300 45 T 600 25 T 835 40" fill="none" stroke="#0ECB81" stroke-width="2.5" filter="url(#glowGreen)">
      <animate attributeName="d" dur="0.8s" repeatCount="indefinite" values="
        M 15 50 Q 150 20 300 45 T 600 25 T 835 40;
        M 15 35 Q 150 55 300 25 T 600 45 T 835 20;
        M 15 50 Q 150 20 300 45 T 600 25 T 835 40" />
    </path>
  </g>
</svg>
