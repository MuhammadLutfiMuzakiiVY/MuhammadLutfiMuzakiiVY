<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="100%" height="260">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="50%" stop-color="#0A1424" />
      <stop offset="100%" stop-color="#020407" />
    </linearGradient>

    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="900" height="260" rx="10" fill="url(#bgGrad)" stroke="#00F5FF" stroke-width="1.6" filter="url(#glowCyan)" />

  <!-- TERMINAL HEADER BAR -->
  <rect x="14" y="14" width="872" height="36" rx="6" fill="#08111F" stroke="#00C8FF" stroke-width="0.8" />
  <circle cx="36" cy="32" r="5" fill="#FF0055" />
  <circle cx="53" cy="32" r="5" fill="#FFB000" />
  <circle cx="70" cy="32" r="5" fill="#00F5FF" />
  <text x="92" y="36" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="900" fill="#00F5FF" letter-spacing="1">
    🐧 LINUX AUTOMATED AGENT TERMINAL <tspan fill="#FFFFFF">| TELEMETRY MONITOR</tspan>
  </text>

  <!-- CONTINUOUS SCROLLING COMMAND STREAM -->
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" fill="#00F5FF">
    <g transform="translate(25, 65)">
      <!-- Line 1 -->
      <text y="0" fill="#00F5FF">$ cargo build --release</text>
      <text y="16" fill="#50FA7B">    Compiling hft_core v5.0.0 ... Finished release [optimized] in 0.42s</text>

      <!-- Line 2 -->
      <text y="38" fill="#00F5FF">$ docker ps</text>
      <text y="54" fill="#50FA7B">    CONTAINER ID: 89d7c0ff  IMAGE: postgres:17-alpine  STATUS: Up 14 days (healthy)</text>

      <!-- Line 3 -->
      <text y="76" fill="#00F5FF">$ npm run dev</text>
      <text y="92" fill="#50FA7B">    ready - started server on 0.0.0.0:3000, url: http://localhost:3000</text>

      <!-- Line 4 -->
      <text y="114" fill="#00F5FF">$ git status</text>
      <text y="130" fill="#50FA7B">    On branch main. Your branch is up to date. Nothing to commit, working tree clean.</text>

      <!-- Line 5 -->
      <text y="152" fill="#00F5FF">$ python ai.py --model=DeepSeek-V3</text>
      <text y="168" fill="#50FA7B">    [✓] Model Loaded | Throughput: 650 tok/s | Latency: 3.1ms | Inference Complete</text>

      <!-- Line 6 -->
      <text y="190" fill="#00F5FF">$ systemctl status cyber-sentinel.service</text>
      <text y="206" fill="#50FA7B">    ● cyber-sentinel.service - Active: active (running) since Wed 2026-07-22 23:55:00 UTC</text>

      <animateTransform attributeName="transform" type="translate" values="25, 65; 25, -65" dur="10s" repeatCount="indefinite" />
    </g>
  </g>
</svg>
