<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="100%" height="280">
  <defs>
    <linearGradient id="hackerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020503" />
      <stop offset="50%" stop-color="#05150A" />
      <stop offset="100%" stop-color="#010804" />
    </linearGradient>

    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="900" height="280" rx="10" fill="url(#hackerBg)" stroke="#00FF66" stroke-width="1.8" filter="url(#glowGreen)" />

  <!-- TERMINAL HEADER BAR -->
  <rect x="14" y="14" width="872" height="36" rx="6" fill="#05150A" stroke="#00FF66" stroke-width="0.8" />
  <circle cx="36" cy="32" r="5" fill="#FF0055" />
  <circle cx="53" cy="32" r="5" fill="#FFB000" />
  <circle cx="70" cy="32" r="5" fill="#00FF66" filter="url(#glowGreen)" />
  <text x="92" y="36" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="900" fill="#00FF66" letter-spacing="1">
    💀 HACKER AUTOMATED KERNEL TERMINAL <tspan fill="#FFFFFF">| HIGH-SPEED EXPLOIT TELEMETRY</tspan>
  </text>

  <!-- RAPIDLY SCROLLING HACKER COMMAND STREAM (DURATION 2.0s FAST REPEAT) -->
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="900" fill="#00FF66">
    <g transform="translate(25, 65)">
      <!-- Line 1 -->
      <text y="0" fill="#00FF66">$ nmap -sS -sV -p- 192.168.1.1/24</text>
      <text y="16" fill="#50FA7B">    [+] 65,535 PORTS SCANNED IN 0.04s • OPEN: 22(SSH), 80(HTTP), 443(HTTPS), 8080, 9090</text>

      <!-- Line 2 -->
      <text y="38" fill="#00FF66">$ hydra -l root -P /usr/share/wordlists/rockyou.txt ssh://192.168.1.1</text>
      <text y="54" fill="#50FA7B">    [+] 1/1 PASSWORD FOUND: [root:P@ssw0rd2026!] • TARGET PWNED IN 0.12s</text>

      <!-- Line 3 -->
      <text y="76" fill="#00FF66">$ rustc --crate-type=cdylib -C opt-level=3 kernel_inject.rs</text>
      <text y="92" fill="#50FA7B">    [+] COMPILATION PASSED IN 0.18s • RING 0 EXPLOIT BINARY READY</text>

      <!-- Line 4 -->
      <text y="114" fill="#00FF66">$ python3 -m vllm.entrypoints.openai.api_server --model DeepSeek-V3</text>
      <text y="130" fill="#50FA7B">    [+] vLLM SERVING ACTIVE • 650 tok/s • 3.1ms INFERENCE LATENCY SLO</text>

      <!-- Line 5 -->
      <text y="152" fill="#00FF66">$ msfconsole -q -x "use exploit/multi/handler; set PAYLOAD linux/x64/meterpreter; run"</text>
      <text y="168" fill="#50FA7B">    [+] METERPRETER SESSION 1 OPENED (192.168.1.1:4444 -&gt; 192.168.1.100:54321)</text>

      <!-- Line 6 -->
      <text y="190" fill="#00FF66">$ systemctl status cyber-sentinel.service</text>
      <text y="206" fill="#50FA7B">    ● cyber-sentinel.service - Active: active (running) • 0 CVE RISKS • 4,892 ATTACKS BLOCKED</text>

      <animateTransform attributeName="transform" type="translate" values="25, 65; 25, -65; 25, 65" dur="4.0s" repeatCount="indefinite" />
    </g>
  </g>

  <!-- BLINKING GREEN CURSOR -->
  <rect x="750" y="240" width="10" height="16" fill="#00FF66" filter="url(#glowGreen)">
    <animate attributeName="opacity" values="1;0;1" dur="0.2s" repeatCount="indefinite" />
  </rect>
</svg>
