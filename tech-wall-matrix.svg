        <text x="80" fill="#FFFFFF">Next.js</text>
        <text x="145" fill="#61DAFB">React</text>
        <text x="200" fill="#4FC08D">Vue</text>
        <text x="240" fill="#DD0031">Angular</text>
        <text x="310" fill="#02569B">Flutter</text>
        <text x="375" fill="#FF2D20">Laravel</text>
        <text x="440" fill="#6DB33F">Spring Boot</text>
