        <text x="70" fill="#326CE5">Kubernetes</text>
        <text x="160" fill="#009639">Nginx</text>
        <text x="215" fill="#FCC624">Linux</text>
        <text x="270" fill="#2088FF">GitHub Actions</text>
        <text x="390" fill="#844FBA">Terraform</text>
        <text x="475" fill="#F38020">Cloudflare</text>
        <text x="565" fill="#FF9900">AWS</text>
        <text x="610" fill="#0089D6">Azure</text>
        <text x="660" fill="#4285F4">GCP</text>
      </g>
    </g>

    <!-- 5. TOOLS & AI AGENTS -->
    <g transform="translate(0, 300)">
      <text y="0" font-size="11" font-weight="900" fill="#FFB000">🛠️ TOOLS &amp; AI AGENT ECOSYSTEM:</text>
      <rect x="0" y="10" width="850" height="48" rx="6" fill="#0A1424" stroke="#1E293B" stroke-width="1" />
      <g font-size="10" transform="translate(15, 38)">
