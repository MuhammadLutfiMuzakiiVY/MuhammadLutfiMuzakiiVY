      <text y="0" font-size="11" font-weight="900" fill="#00F5FF">🔤 LANGUAGES:</text>
      <rect x="0" y="10" width="850" height="48" rx="6" fill="#0A1424" stroke="#1E293B" stroke-width="1" />
      <g font-size="10" transform="translate(15, 38)">
        <text fill="#DEA584">Rust</text>
        <text x="60" fill="#00ADD8">Go</text>
        <text x="100" fill="#3776AB">Python</text>
        <text x="170" fill="#3178C6">TypeScript</text>
        <text x="260" fill="#F7DF1E">JavaScript</text>
        <text x="350" fill="#777BB4">PHP</text>
        <text x="400" fill="#ED8B00">Java</text>
        <text x="450" fill="#239120">C#</text>
        <text x="490" fill="#00599C">C++</text>
        <text x="540" fill="#A8B9CC">C</text>
        <text x="570" fill="#7F52FF">Kotlin</text>
        <text x="630" fill="#F05138">Swift</text>
        <text x="680" fill="#0175C2">Dart</text>
        <text x="730" fill="#00F5FF">SQL</text>
        <text x="770" fill="#4EAA25">Shell</text>
