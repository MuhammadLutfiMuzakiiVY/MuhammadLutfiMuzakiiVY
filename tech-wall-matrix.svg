<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="100%" height="420">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="50%" stop-color="#091322" />
      <stop offset="100%" stop-color="#03060C" />
    </linearGradient>

    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <rect width="900" height="420" rx="10" fill="url(#bgGrad)" stroke="#00F5FF" stroke-width="1.6" filter="url(#glowCyan)" />

  <!-- TOP TITLE BAR -->
  <rect x="14" y="14" width="872" height="36" rx="6" fill="#08111F" stroke="#00C8FF" stroke-width="0.8" />
  <circle cx="36" cy="32" r="5" fill="#FF0055" />
  <circle cx="53" cy="32" r="5" fill="#FFB000" />
  <circle cx="70" cy="32" r="5" fill="#00F5FF" />
  <text x="92" y="36" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="900" fill="#00F5FF" letter-spacing="1">
    ⚡ TECHNOLOGY STACK WALL &amp; ENTERPRISE ECOSYSTEM
  </text>

  <!-- 5 CATEGORIES OF TECH CARDS -->
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="bold" transform="translate(25, 65)">

    <!-- 1. LANGUAGES -->
