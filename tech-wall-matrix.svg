<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="100%" height="520">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="50%" stop-color="#081220" />
      <stop offset="100%" stop-color="#020408" />
    </linearGradient>

    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00F5FF" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.15" />
    </pattern>
  </defs>

  <rect width="900" height="520" rx="12" fill="url(#bgGrad)" stroke="#00F5FF" stroke-width="1.8" filter="url(#glowCyan)" />
  <rect width="900" height="520" rx="12" fill="url(#grid)" />

  <!-- TOP TITLE BAR -->
