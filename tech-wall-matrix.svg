        <text x="80" fill="#000000">JetBrains</text>
        <text x="160" fill="#F05032">Git</text>
        <text x="200" fill="#FFFFFF">GitHub</text>
        <text x="260" fill="#F24E1E">Figma</text>
        <text x="315" fill="#FF6C37">Postman</text>
        <text x="385" fill="#00F5FF">Cursor</text>
        <text x="450" fill="#D97706">Claude Code</text>
        <text x="550" fill="#10A37F">OpenAI API</text>
        <text x="650" fill="#7B61FF">Burp Suite</text>
      </g>
